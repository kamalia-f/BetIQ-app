// ── REAL MATCHES ──
async function fetchRealMatches(competition){
  try{
    const compId=COMPETITION_IDS[competition]||"PL";
    const today=new Date().toISOString().split('T')[0];
    const nextWeek=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
    const res=await fetch(`https://api.football-data.org/v4/competitions/${compId}/matches?dateFrom=${today}&dateTo=${nextWeek}&status=SCHEDULED`,{headers:{"X-Auth-Token":FDATA_KEY}});
    const data=await res.json();
    if(!data.matches||!data.matches.length)return[];
    return data.matches.slice(0,10).map(m=>({id:m.id,home:m.homeTeam.shortName||m.homeTeam.name,away:m.awayTeam.shortName||m.awayTeam.name,date:new Date(m.utcDate).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),time:new Date(m.utcDate).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),competition:m.competition.name}));
  }catch{return[];}
}

  }

// ── AUTH HOOK ──
function useAuth(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const fp=useCallback(async(id)=>{const{data}=await sb.from("profiles").select("*").eq("id",id).single();setProfile(data);setLoading(false);},[]);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);else{setProfile(null);setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[fp]);
  const refresh=useCallback(async()=>{if(user){const{data}=await sb.from("profiles").select("*").eq("id",user.id).single();setProfile(data);}},[user]);
  return{user,profile,loading,refresh};
}

function MatchSelector({onSelect,selected,sport,setSport}){
  const[league,setLeague]=useState("Premier League");
  const[matches,setMatches]=useState([]);
  const[loading,setLoading]=useState(false);
  const[pickModal,setPickModal]=useState(null);
  const[fallback,setFallback]=useState(false);
  const leagues=sport==="Football"?Object.keys(COMPETITION_IDS):["NBA"];
  useEffect(()=>{if(sport==="Basketball")setLeague("NBA");else setLeague("Premier League");},[sport]);
  useEffect(()=>{load();},[league]);
  const load=async()=>{setLoading(true);setMatches([]);setFallback(false);if(league==="NBA"){setMatches(FALLBACK["NBA"]);setFallback(true);setLoading(false);return;}const real=await fetchRealMatches(league);if(real.length>0){setMatches(real);}else{setMatches(FALLBACK[league]||[]);setFallback(true);}setLoading(false);};
  const isSel=id=>selected.some(p=>p.matchId===id);
  const tap=m=>{if(isSel(m.id)){onSelect(null,m);}else{setPickModal(m);}};
  const pickIt=pick=>{onSelect({...pickModal,pickType:pick},pickModal);setPickModal(null);};
  const picks=sport==="Basketball"?BASKETBALL_PICKS:FOOTBALL_PICKS;
  return(
    <div>
      <div style={{display:"flex",gap:4,background:"var(--s)",padding:4,borderRadius:14,marginBottom:12,border:"1px solid var(--b)"}}>
        {["Football","Basketball"].map(s=><button key={s} onClick={()=>setSport(s)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:sport===s?"linear-gradient(135deg,#10b981,#059669)":"transparent",color:sport===s?"white":"var(--t2)",transition:"all 0.2s"}}>{s==="Football"?"⚽":"🏀"} {s}</button>)}
      </div>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>

  const saveSlip=async()=>{if(!user||!analysis)return;const fmt=picks.map(p=>`${p.match} — ${p.pick}`);await sb.from("slips").insert({user_id:user.id,tipster_id:user.id,sport,matches:fmt,confidence:analysis.overallConfidence,risk_level:analysis.riskLevel,combined_odds:parseFloat(analysis.combinedOdds),recommendation:analysis.recommendation,ai_analysis:analysis,is_public:false,price:0});alert("✅ Slip saved! Go to Marketplace to list it.");};

      <div style={{display:"flex",gap:4,marginBottom:14}}>{["Select","Analyzing","Results"].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"7px 4px",borderRadius:10,fontSize:11,fontWeight:700,background:step===i+1?"linear-gradient(135deg,#10b981,#059669)":step>i+1?"rgba(16,185,129,0.1)":"var(--s)",color:step===i+1?"white":step>i+1?"#10b981":"var(--t3)",border:`1px solid ${step===i+1?"transparent":step>i+1?"rgba(16,185,129,0.2)":"var(--b)"}`}}>{s}</div>)}</div>
      {picks.length>0&&<div style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:12,padding:12,marginBottom:12}}><p style={{color:"#10b981",fontSize:12,fontWeight:700,marginBottom:6}}>✓ {picks.length} pick{picks.length>1?"s":""} selected</p>{picks.map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span style={{color:"white",fontSize:12}}>{p.match}</span><span style={{color:"#10b981",fontSize:11,fontWeight:700}}>{p.pick}</span></div>)}</div>}
      <MatchSelector onSelect={handleSelect} selected={picks} sport={sport} setSport={setSport}/>
      <div style={{background:"var(--s)",borderRadius:14,padding:14,marginBottom:14,border:"1px solid var(--b)",marginTop:14}}><p style={{color:"var(--t2)",fontSize:11,fontWeight:700,marginBottom:8}}>STAKE ($)</p><div style={{display:"flex",gap:6}}>{[5,10,25,50,100].map(s=><button key={s} onClick={()=>setStake(s)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${stake===s?"var(--g)":"var(--b)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:stake===s?"rgba(16,185,129,0.1)":"var(--s2)",color:stake===s?"var(--g)":"var(--t2)"}}>${s}</button>)}</div></div>
      <button onClick={analyze} disabled={loading||!picks.length} className="btn" style={{marginBottom:16}}>{loading?"🤖 Analyzing...":"🚀 Analyze With Ultimate AI"}</button>
      {loading&&<div style={{background:"var(--s)",borderRadius:20,padding:24,border:"1px solid rgba(16,185,129,0.15)",marginBottom:16,textAlign:"center"}}><div style={{fontSize:48,marginBottom:10}} className="bounce">🤖</div><p style={{color:"white",fontWeight:900,fontSize:16,marginBottom:4}}>Ultimate AI Processing</p><p style={{color:"var(--t2)",fontSize:12,marginBottom:18}}>15-factor analysis running...</p>{steps.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:i<=loadStep?1:0.2,transition:"opacity 0.5s"}}><div style={{width:7,height:7,borderRadius:"50%",background:i<loadStep?"#10b981":i===loadStep?"#f0b429":"rgba(255,255,255,0.1)",flexShrink:0}} className={i===loadStep?"pulse":""}/><span style={{color:i===loadStep?"white":i<loadStep?"#10b981":"var(--t3)",fontSize:12}}>{s}</span></div>)}<div style={{marginTop:12,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:8}}><div style={{background:"linear-gradient(90deg,#10b981,#059669)",height:3,borderRadius:3,width:`${((loadStep+1)/steps.length)*100}%`,transition:"width 0.5s ease"}}/></div></div>}
      {analysis&&!loading&&<div className="fade-in">
        <div style={{background:"linear-gradient(135deg,var(--s),rgba(16,185,129,0.03))",borderRadius:20,padding:20,border:"1px solid rgba(16,185,129,0.15)",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}><div><h3 style={{color:"white",fontSize:18,fontWeight:900,marginBottom:6}}>AI Verdict</h3><RecBadge rec={analysis.recommendation}/></div><ConfRing v={analysis.overallConfidence}/></div>
          {analysis.summary&&<div style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.15)",borderRadius:10,padding:"8px 12px",marginBottom:10}}><p style={{color:"#10b981",fontSize:12,fontWeight:700}}>💡 {analysis.summary}</p></div>}
          <p style={{color:"#d1d5db",fontSize:13,lineHeight:1.7,marginBottom:12}}>{analysis.aiVerdict}</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>{[{l:"Odds",v:`@${analysis.combinedOdds}`,c:"#f0b429"},{l:"Win Prob",v:analysis.winProbability,c:"#10b981"},{l:"EV",v:analysis.expectedValue,c:"#58a6ff"},{l:"Potential",v:`$${(parseFloat(analysis.combinedOdds)*stake).toFixed(0)}`,c:"#10b981"},{l:"Kelly",v:analysis.kellyStake,c:"#a78bfa"},{l:"Value",v:analysis.valueRating,c:"#f0b429"}].map(item=><div key={item.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 8px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:14}}>{item.v}</div><div style={{color:"var(--t3)",fontSize:10,marginTop:3}}>{item.l}</div></div>)}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}><RiskTag r={analysis.riskLevel}/>{analysis.marketConsensus&&<span style={{background:"rgba(88,166,255,0.1)",color:"#58a6ff",border:"1px solid rgba(88,166,255,0.2)",fontSize:10,padding:"3px 8px",borderRadius:20,fontWeight:700}}>📈 {analysis.marketConsensus}</span>}</div>
          {analysis.bankrollAdvice&&<div style={{background:"rgba(167,139,250,0.08)",borderRadius:10,padding:"8px 12px",marginBottom:6}}><p style={{color:"#a78bfa",fontSize:11,fontWeight:700}}>💰 {analysis.bankrollAdvice}</p></div>}
          {analysis.accumulatorTip&&<div style={{background:"rgba(88,166,255,0.08)",borderRadius:10,padding:"8px 12px",marginBottom:6}}><p style={{color:"#58a6ff",fontSize:11,fontWeight:700}}>⚡ {analysis.accumulatorTip}</p></div>}
          {analysis.injuryAlert&&analysis.injuryAlert!=="No major concerns."&&<div style={{background:"rgba(248,81,73,0.08)",borderRadius:10,padding:"8px 12px"}}><p style={{color:"#f85149",fontSize:11,fontWeight:700}}>🏥 {analysis.injuryAlert}</p></div>}
        </div>
        <h3 style={{color:"white",fontWeight:900,fontSize:15,marginBottom:10}}>📊 Pick Breakdown</h3>
        {analysis.picks?.map((pick,i)=><div key={i} style={{background:"var(--s)",borderRadius:16,padding:16,border:"1px solid var(--b)",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}><div style={{flex:1,marginRight:10}}><p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:3}}>{pick.match}</p><p style={{color:"#10b981",fontSize:12,fontWeight:700}}>✓ {pick.pick}</p></div><div style={{textAlign:"center"}}><div style={{color:"#10b981",fontWeight:900,fontSize:20}}>{pick.confidence}%</div></div></div><ConfBar v={pick.confidence}/><div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"8px 0"}}>{pick.formRating&&<GradeTag grade={pick.formRating}/>}{pick.valueRating&&<span style={{background:"rgba(255,255,255,0.05)",color:"var(--t2)",fontSize:10,padding:"2px 8px",borderRadius:6}}>{pick.valueRating}</span>}{pick.h2hEdge&&<span style={{background:"rgba(88,166,255,0.08)",color:"#58a6ff",fontSize:10,padding:"2px 8px",borderRadius:6}}>H2H: {pick.h2hEdge}</span>}</div><p style={{color:"#9ca3af",fontSize:12,lineHeight:1.5,marginBottom:4}}>{pick.reasoning}</p><p style={{color:"#58a6ff",fontSize:11}}>🔑 {pick.keyFactor}</p>{pick.riskNote&&<p style={{color:"#f0b429",fontSize:11,marginTop:3}}>⚠️ {pick.riskNote}</p>}</div>)}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}><button onClick={saveSlip} className="btn-o">💾 Save Slip</button><button onClick={()=>{setAnalysis(null);setStep(1);setPicks([]);}} style={{padding:12,background:"rgba(16,185,129,0.1)",color:"#10b981",border:"1px solid rgba(16,185,129,0.2)",borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer"}}>🔄 New Slip</button></div>
      </div>}

  );

// ── MARKETPLACE ──
function Marketplace({user,profile,refresh}){
  const[slips,setSlips]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState("All");
  const[sort,setSort]=useState("confidence");
  const[purchased,setPurchased]=useState([]);
  const[unlocked,setUnlocked]=useState(null);
  const[liked,setLiked]=useState([]);
  const[bookmarked,setBookmarked]=useState([]);
  const[selling,setSelling]=useState(false);
  const[mySaved,setMySaved]=useState([]);
  const[selSlip,setSelSlip]=useState("");
  const[sellPrice,setSellPrice]=useState(0);
  const[sellDesc,setSellDesc]=useState("");
  const[commentSlip,setCommentSlip]=useState(null);
  const[comments,setComments]=useState([]);
  const[newComment,setNewComment]=useState("");
  const[ratingSlip,setRatingSlip]=useState(null);
  const[tipsterView,setTipsterView]=useState(null);

  useEffect(()=>{fetchAll();},[user]);
  const fetchAll=async()=>{
    setLoading(true);
    const[{data:s},{data:p},{data:l},{data:b},{data:ms}]=await Promise.all([
      sb.from("slips").select("*,profiles(username,badge,win_rate,roi,plan,avatar_color,bio,sport_specialty,total_sold)").eq("is_public",true).order("confidence",{ascending:false}),
      user?sb.from("purchases").select("slip_id").eq("buyer_id",user.id):{data:[]},
      user?sb.from("slip_likes").select("slip_id").eq("user_id",user.id):{data:[]},
      user?sb.from("bookmarks").select("tipster_id").eq("user_id",user.id):{data:[]},
      user?sb.from("slips").select("*").eq("user_id",user.id).eq("is_public",false):{data:[]},
    ]);
    setSlips(s||[]);setPurchased((p||[]).map(x=>x.slip_id));setLiked((l||[]).map(x=>x.slip_id));setBookmarked((b||[]).map(x=>x.tipster_id));setMySaved(ms||[]);
    setLoading(false);
  };

  const buy=async(slip)=>{
    if(!profile)return;
    if(slip.price>0&&profile.wallet<slip.price){alert("Insufficient wallet! Top up in Profile.");return;}
    await sb.from("purchases").insert({buyer_id:user.id,slip_id:slip.id,seller_id:slip.user_id,amount:slip.price||0,platform_fee:0});
    if(slip.price>0)await sb.from("profiles").update({wallet:profile.wallet-slip.price}).eq("id",user.id);
    await sb.from("transactions").insert({user_id:user.id,type:"slip_buy",amount:slip.price||0,fee:0,description:`Got slip from ${slip.profiles?.username}`});
    await createNotification(slip.user_id,"sale","New Slip Sale! 💰",`${profile.username} got your slip!`,"💰");
    setPurchased(p=>[...p,slip.id]);setUnlocked(slip);refresh();
  };

  const toggleLike=async(slip)=>{
    if(!user)return;
    const isLiked=liked.includes(slip.id);
    if(isLiked){await sb.from("slip_likes").delete().eq("user_id",user.id).eq("slip_id",slip.id);setLiked(l=>l.filter(x=>x!==slip.id));}
    else{await sb.from("slip_likes").insert({user_id:user.id,slip_id:slip.id});setLiked(l=>[...l,slip.id]);}
    fetchAll();
  };

  const toggleBookmark=async(tipsterId)=>{
    if(!user)return;
    const isBm=bookmarked.includes(tipsterId);
    if(isBm){await sb.from("bookmarks").delete().eq("user_id",user.id).eq("tipster_id",tipsterId);setBookmarked(b=>b.filter(x=>x!==tipsterId));}
    else{await sb.from("bookmarks").insert({user_id:user.id,tipster_id:tipsterId});setBookmarked(b=>[...b,tipsterId]);}
  };

  const loadComments=async(slipId)=>{const{data}=await sb.from("slip_comments").select("*,profiles(username,avatar_color)").eq("slip_id",slipId).order("created_at",{ascending:true});setComments(data||[]);};
  const postComment=async()=>{if(!newComment.trim()||!commentSlip)return;await sb.from("slip_comments").insert({user_id:user.id,slip_id:commentSlip,content:newComment.trim()});setNewComment("");loadComments(commentSlip);fetchAll();};
  const submitRating=async(slipId,rating,result)=>{await sb.from("slip_ratings").upsert({user_id:user.id,slip_id:slipId,rating,result},{onConflict:"user_id,slip_id"});setRatingSlip(null);alert("✅ Rating submitted!");};
  const listForSale=async()=>{if(!selSlip)return;await sb.from("slips").update({is_public:true,price:parseFloat(sellPrice)||0,description:sellDesc}).eq("id",selSlip);setSelling(false);fetchAll();alert("✅ Slip listed!");};

  const sorted=[...slips].filter(s=>filter==="All"||s.sport===filter).sort((a,b)=>sort==="confidence"?b.confidence-a.confidence:sort==="price"?a.price-b.price:sort==="likes"?(b.likes_count||0)-(a.likes_count||0):(b.profiles?.roi||0)-(a.profiles?.roi||0));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Marketplace</h2><p style={{color:"var(--t2)",fontSize:12,marginTop:4}}>Wallet: <span style={{color:"var(--g)",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p></div>
        <button onClick={()=>setSelling(!selling)} style={{padding:"9px 14px",background:"linear-gradient(135deg,#10b981,#059669)",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Sell</button>
      </div>

      {selling&&<div style={{background:"var(--s)",borderRadius:16,padding:16,border:"1px solid rgba(16,185,129,0.2)",marginBottom:14}} className="fade-in"><p style={{color:"white",fontWeight:700,marginBottom:10}}>List Slip For Sale</p><div style={{display:"flex",flexDirection:"column",gap:8}}><select value={selSlip} onChange={e=>setSelSlip(e.target.value)} className="sel"><option value="">Select saved slip...</option>{mySaved.map(s=><option key={s.id} value={s.id}>{s.sport} · {s.matches?.length} picks · {s.confidence}%</option>)}</select><input value={sellPrice} onChange={e=>setSellPrice(e.target.value)} placeholder="Price (0 = free)" type="number" step="0.5" min="0" className="inp"/><input value={sellDesc} onChange={e=>setSellDesc(e.target.value)} placeholder="Short description..." className="inp"/><button onClick={listForSale} className="btn">List For Sale</button></div></div>}

      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        {["All","Football","Basketball"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===f?"var(--g)":"var(--b)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:filter===f?"rgba(16,185,129,0.1)":"transparent",color:filter===f?"var(--g)":"var(--t2)"}}>{f}</button>)}
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{marginLeft:"auto",background:"var(--s)",color:"var(--t2)",border:"1px solid var(--b)",borderRadius:8,padding:"5px 8px",fontSize:11}}>
          <option value="confidence">↓ Confidence</option><option value="price">↑ Price</option><option value="likes">↓ Likes</option><option value="roi">↓ ROI</option>
        </select>
      </div>

      {loading?<Spinner/>:sorted.length===0?<div style={{textAlign:"center",color:"var(--t2)",padding:60}}><div style={{fontSize:48,marginBottom:12}}>🛒</div><p style={{color:"white",fontWeight:700}}>No slips yet</p><p style={{fontSize:13,marginTop:6}}>Build one with AI and share it!</p></div>:sorted.map(slip=>(
        <div key={slip.id} style={{background:"var(--s)",borderRadius:18,padding:16,border:slip.profiles?.badge==="elite"?"1px solid rgba(16,185,129,0.25)":"1px solid var(--b)",marginBottom:10}} className="fade-in">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",flex:1}} onClick={()=>setTipsterView(slip.profiles)}>
              <Avatar name={slip.profiles?.username} color={slip.profiles?.avatar_color||"#10b981"} size={38} radius={12}/>
              <div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{color:"white",fontWeight:700,fontSize:13}}>{slip.profiles?.username}</span><Badge type={slip.profiles?.badge}/></div><span style={{color:"var(--t2)",fontSize:11}}>{slip.sport} • Win {slip.profiles?.win_rate||0}%</span></div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{color:slip.price>0?"var(--g)":"#84cc16",fontWeight:900,fontSize:18}}>{slip.price>0?`$${slip.price?.toFixed(2)}`:"FREE"}</div>
              <button onClick={()=>toggleBookmark(slip.user_id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,marginTop:2,padding:0}}>{bookmarked.includes(slip.user_id)?"⭐":"☆"}</button>
            </div>
          </div>

// ── LEADERBOARD ──
function Leaderboard({user}){
  const[tipsters,setTipsters]=useState([]);
  const[loading,setLoading]=useState(true);
  const[followed,setFollowed]=useState([]);
  const[challenge,setChallenge]=useState(null);

  useEffect(()=>{
    Promise.all([
      sb.from("profiles").select("*").order("win_rate",{ascending:false}).limit(20),
      user?sb.from("follows").select("following_id").eq("follower_id",user.id):{data:[]},
      sb.from("challenges").select("*").eq("is_active",true).limit(1).single(),
    ]).then(([{data:t},{data:f},{data:c}])=>{
      setTipsters((t||[]).filter(x=>x.total_sold>0||x.win_rate>0));
      setFollowed((f||[]).map(x=>x.following_id));
      setChallenge(c);
      setLoading(false);
    });
  },[user]);

  const toggleFollow=async(tipsterId)=>{
    if(!user||tipsterId===user.id)return;
    const isF=followed.includes(tipsterId);
    if(isF){await sb.from("follows").delete().eq("follower_id",user.id).eq("following_id",tipsterId);setFollowed(f=>f.filter(x=>x!==tipsterId));}
    else{await sb.from("follows").insert({follower_id:user.id,following_id:tipsterId});setFollowed(f=>[...f,tipsterId]);await createNotification(tipsterId,"follow","New Follower! 👥","Someone started following you!","👥");}
  };

  return(
    <div>
      <div style={{marginBottom:16}}><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Leaderboard</h2><p style={{color:"var(--t2)",fontSize:12,marginTop:4}}>Top tipsters • Resets every Monday</p></div>

      {challenge&&<div style={{background:"linear-gradient(135deg,rgba(167,139,250,0.12),rgba(139,92,246,0.06))",border:"1px solid rgba(167,139,250,0.2)",borderRadius:16,padding:16,marginBottom:16}}>

        <p style={{color:"#a78bfa",fontWeight:700,fontSize:14,marginBottom:4}}>{challenge.title}</p>
        <p style={{color:"var(--t2)",fontSize:12,marginBottom:10}}>{challenge.description}</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#10b981",fontWeight:900,fontSize:16}}>🏆 ${challenge.reward_amount} Reward</span><button className="btn" style={{width:"auto",padding:"8px 16px",fontSize:12}}>Join</button></div>
      </div>}

      {loading?<Spinner/>:tipsters.length===0?<div style={{textAlign:"center",color:"var(--t2)",padding:60}}><div style={{fontSize:52,marginBottom:12}}>🏆</div><p style={{color:"white",fontWeight:900,fontSize:18}}>Empty Leaderboard</p><p style={{fontSize:13,marginTop:6}}>Build & sell slips to rank!</p></div>:(
        <>
          {tipsters.length>=3&&<div style={{background:"linear-gradient(180deg,var(--s),var(--bg))",borderRadius:20,padding:20,border:"1px solid var(--b)",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:20}}>
              {[tipsters[1],tipsters[0],tipsters[2]].map((t,i)=>{if(!t)return null;const h=[88,116,68],cl=["#4b5563","#f0b429","#92400e"],med=["🥈","🥇","🥉"],rk=[2,1,3];return<div key={t.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><span style={{fontSize:22}}>{med[i]}</span><Avatar name={t.username} color={t.avatar_color||"#10b981"} size={46} radius={14}/><span style={{color:"white",fontSize:11,fontWeight:700}}>{t.username}</span><span style={{color:"#10b981",fontSize:11,fontWeight:700}}>{t.win_rate}%</span><div style={{width:60,height:h[i],background:cl[i],borderRadius:"10px 10px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontWeight:900}}>#{rk[i]}</span></div></div>;})}
            </div>
          </div>}
          {tipsters.map((t,i)=>(
            <div key={t.id} style={{background:"var(--s)",borderRadius:16,padding:14,border:t.badge==="elite"?"1px solid rgba(16,185,129,0.2)":"1px solid var(--b)",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:30,height:30,borderRadius:9,background:i===0?"linear-gradient(135deg,#f0b429,#d97706)":i===1?"linear-gradient(135deg,#9ca3af,#6b7280)":i===2?"linear-gradient(135deg,#92400e,#78350f)":"var(--s2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:11,color:i<3?"black":"var(--t2)"}}>{i+1}</div>
                <Avatar name={t.username} color={t.avatar_color||"#10b981"} size={42} radius={12}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"white",fontWeight:700,fontSize:13}}>{t.username}</span><Badge type={t.badge}/>{t.id===user?.id&&<span style={{color:"#f0b429",fontSize:10,fontWeight:700}}>YOU</span>}</div>
                  <span style={{color:"var(--t2)",fontSize:11}}>{t.sport_specialty||"Football"} • {t.total_sold} sold</span>

              </div>

                {[{l:"ROI",v:`+${t.roi}%`,c:"#f0b429"},{l:"Sold",v:t.total_sold,c:"#58a6ff"},{l:"Streak",v:`${t.streak}🔥`,c:"#f97316"}].map(item=><div key={item.l} style={{background:"var(--s2)",borderRadius:10,padding:"7px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:12}}>{item.v}</div><div style={{color:"var(--t3)",fontSize:10,marginTop:2}}>{item.l}</div></div>)}
              </div>

          ))}

      )}
    </div>
  );
}

    if(!user)return;
    sb.from("notifications").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(30).then(({data})=>{setNotifs(data||[]);setLoading(false);});
    sb.from("notifications").update({read:true}).eq("user_id",user.id).eq("read",false);
  },[user]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(8px)"}} onClick={onClose}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h3 style={{color:"white",fontWeight:900,fontSize:18}}>Notifications</h3><button onClick={onClose} style={{background:"none",border:"none",color:"var(--t2)",fontSize:20,cursor:"pointer"}}>✕</button></div>
        {loading?<Spinner/>:notifs.length===0?<div style={{textAlign:"center",color:"var(--t2)",padding:40}}><div style={{fontSize:40,marginBottom:8}}>🔔</div><p>No notifications yet</p></div>:notifs.map(n=>(
          <div key={n.id} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:"1px solid var(--b)",opacity:n.read?0.6:1}}>
            <span style={{fontSize:22,flexShrink:0}}>{n.icon}</span>
            <div style={{flex:1}}><p style={{color:"white",fontWeight:n.read?400:700,fontSize:13}}>{n.title}</p>{n.body&&<p style={{color:"var(--t2)",fontSize:12,marginTop:2}}>{n.body}</p>}<p style={{color:"var(--t3)",fontSize:10,marginTop:3}}>{new Date(n.created_at).toLocaleDateString()}</p></div>
            {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:"#10b981",flexShrink:0,marginTop:4}}/>}

        ))}

    </div>

}

// ── CHAT ──
function Chat({user,profile}){
  const[convos,setConvos]=useState([]);
  const[activeChat,setActiveChat]=useState(null);
  const[messages,setMessages]=useState([]);
  const[newMsg,setNewMsg]=useState("");
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[searchRes,setSearchRes]=useState([]);
  const msgEnd=useRef(null);
  useEffect(()=>{if(user)fetchConvos();},[user]);
  useEffect(()=>{if(activeChat)fetchMsgs(activeChat);},[activeChat]);
  useEffect(()=>{msgEnd.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const fetchConvos=async()=>{setLoading(true);const{data}=await sb.from("messages").select("*").or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).order("created_at",{ascending:false});if(!data){setLoading(false);return;}const pids=[...new Set(data.map(m=>m.sender_id===user.id?m.receiver_id:m.sender_id))];const{data:partners}=await sb.from("profiles").select("id,username,avatar_color,badge").in("id",pids);setConvos(pids.map(pid=>{const p=partners?.find(x=>x.id===pid);const last=data.find(m=>m.sender_id===pid||m.receiver_id===pid);const unread=data.filter(m=>m.sender_id===pid&&m.receiver_id===user.id&&!m.read).length;return{pid,partner:p,last,unread};}));setLoading(false);};
  const fetchMsgs=async(pid)=>{const{data}=await sb.from("messages").select("*").or(`and(sender_id.eq.${user.id},receiver_id.eq.${pid}),and(sender_id.eq.${pid},receiver_id.eq.${user.id})`).order("created_at",{ascending:true});setMessages(data||[]);await sb.from("messages").update({read:true}).eq("receiver_id",user.id).eq("sender_id",pid);fetchConvos();};
  const send=async()=>{if(!newMsg.trim()||!activeChat)return;const m={sender_id:user.id,receiver_id:activeChat,content:newMsg.trim(),read:false};await sb.from("messages").insert(m);setMessages(ms=>[...ms,{...m,id:Date.now(),created_at:new Date().toISOString()}]);setNewMsg("");fetchConvos();};
  const searchUsers=async()=>{if(!search.trim())return;const{data}=await sb.from("profiles").select("id,username,avatar_color,badge,sport_specialty").ilike("username",`%${search}%`).neq("id",user.id).limit(8);setSearchRes(data||[]);};
  if(activeChat){
    const cp=convos.find(c=>c.pid===activeChat)?.partner||searchRes.find(u=>u.id===activeChat);
    return<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",marginBottom:10,borderBottom:"1px solid var(--b)"}}>
        <button onClick={()=>setActiveChat(null)} style={{background:"none",border:"none",color:"var(--t2)",fontSize:20,cursor:"pointer",padding:"4px 8px"}}>←</button>
        {cp&&<Avatar name={cp.username} color={cp.avatar_color||"#10b981"} size={38} radius={10}/>}
        <div><p style={{color:"white",fontWeight:700,fontSize:14}}>{cp?.username||"User"}</p><Badge type={cp?.badge}/></div>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,paddingBottom:8}}>
        {messages.length===0&&<div style={{textAlign:"center",color:"var(--t2)",padding:40}}><div style={{fontSize:40,marginBottom:8}}>💬</div><p>Start the conversation!</p></div>}
        {messages.map(m=><div key={m.id} style={{display:"flex",justifyContent:m.sender_id===user.id?"flex-end":"flex-start"}}><div className={m.sender_id===user.id?"msg-me":"msg-them"}><p>{m.content}</p><p style={{fontSize:10,opacity:0.6,marginTop:3,textAlign:"right"}}>{new Date(m.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</p></div></div>)}
        <div ref={msgEnd}/>
      </div>
      <div style={{display:"flex",gap:8,paddingTop:10,borderTop:"1px solid var(--b)"}}>
        <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..." className="inp" style={{flex:1,padding:"11px 14px"}}/>
        <button onClick={send} style={{padding:"11px 16px",background:"linear-gradient(135deg,#10b981,#059669)",color:"white",border:"none",borderRadius:12,fontWeight:700,cursor:"pointer",fontSize:16}}>→</button>
      </div>
    </div>;
  }
  return<div>

// ── AUTH SCREEN ──
function AuthScreen(){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[uname,setUname]=useState("");
  const[ref,setRef]=useState("");
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState({text:"",type:""});
  useEffect(()=>{const p=new URLSearchParams(window.location.search);const r=p.get("ref");if(r)setRef(r);},[]);
  const submit=async()=>{
    if(!email||!pw){setMsg({text:"Please fill all fields",type:"error"});return;}
    setLoading(true);setMsg({text:"",type:""});
    if(mode==="login"){const{error}=await sb.auth.signInWithPassword({email,password:pw});if(error)setMsg({text:error.message,type:"error"});}
    else{
      if(!uname){setMsg({text:"Username required",type:"error"});setLoading(false);return;}
      const{data,error}=await sb.auth.signUp({email,password:pw});
      if(error){setMsg({text:error.message,type:"error"});setLoading(false);return;}
      if(data.user){
        const rc=data.user.id.slice(0,8).toUpperCase();
        await sb.from("profiles").insert({id:data.user.id,username:uname,email,plan:"Free",wallet:ref?25:20,win_rate:0,total_sold:0,streak:0,roi:0,badge:"none",avatar_color:AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)],sport_specialty:"Football",referral_code:rc,referred_by:ref||null,referral_earnings:0,total_referrals:0});
        if(ref){const{data:referrer}=await sb.from("profiles").select("id,wallet,total_referrals,referral_earnings").eq("referral_code",ref).single();if(referrer){await sb.from("profiles").update({wallet:referrer.wallet+5,total_referrals:referrer.total_referrals+1,referral_earnings:referrer.referral_earnings+5}).eq("id",referrer.id);await sb.from("referrals").insert({referrer_id:referrer.id,referred_id:data.user.id,reward_paid:true});}}
        setMsg({text:"Account created!"+(ref?" +$5 bonus!":"")+" Sign in now.",type:"success"});setMode("login");
      }
    }
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"15%",left:"50%",transform:"translateX(-50%)",width:300,height:300,background:"radial-gradient(circle,rgba(16,185,129,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:380,position:"relative",zIndex:1}} className="fade-in">
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,fontWeight:900,color:"white",margin:"0 auto 14px",boxShadow:"0 20px 60px rgba(16,185,129,0.35)",fontFamily:"'Syne',sans-serif"}} className="glow">B</div>
          <h1 style={{color:"white",fontSize:32,fontWeight:900,letterSpacing:"-1px"}}>BetIQ</h1>
          <p style={{color:"var(--t2)",fontSize:13,marginTop:4}}>AI-powered betting intelligence</p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6}}><div style={{width:6,height:6,borderRadius:"50%",background:"#10b981"}} className="pulse"/><span style={{color:"#10b981",fontSize:11,fontWeight:700}}>LIVE MATCHES • REAL AI • 100% FREE</span></div>
        </div>
        <div style={{display:"flex",background:"var(--s)",borderRadius:14,padding:4,marginBottom:18,border:"1px solid var(--b)"}}>{["login","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:11,borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:mode===m?"linear-gradient(135deg,#10b981,#059669)":"transparent",color:mode===m?"white":"var(--t2)",transition:"all 0.2s"}}>{m==="login"?"Sign In":"Create Account"}</button>)}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
          {mode==="signup"&&<input value={uname} onChange={e=>setUname(e.target.value)} placeholder="Choose a username" className="inp" style={{background:"var(--s)",border:"1px solid var(--b)"}}/>}
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" type="email" className="inp" style={{background:"var(--s)",border:"1px solid var(--b)"}}/>
          <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" type="password" className="inp" style={{background:"var(--s)",border:"1px solid var(--b)"}} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {mode==="signup"&&<input value={ref} onChange={e=>setRef(e.target.value)} placeholder="Referral code (optional — get $5!)" className="inp" style={{background:"var(--s)",border:"1px solid var(--b)"}}/>}
        </div>
        {msg.text&&<div style={{padding:"10px 14px",borderRadius:10,background:msg.type==="success"?"rgba(16,185,129,0.1)":"rgba(248,81,73,0.1)",color:msg.type==="success"?"#10b981":"#f85149",fontSize:13,marginBottom:12}}>{msg.text}</div>}

        <div style={{background:"var(--s)",borderRadius:14,padding:14,border:"1px solid var(--b)"}}><p style={{color:"var(--t2)",fontSize:11,textAlign:"center",fontWeight:700,marginBottom:8,letterSpacing:"1px"}}>EVERYTHING IS FREE</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{["Unlimited AI","Real matches","Chat & follow","Referral $5","Likes & comments","Notifications"].map(f=><div key={f} style={{display:"flex",alignItems:"center",gap:5,color:"var(--t2)",fontSize:11}}><span style={{color:"var(--g)"}}>✓</span>{f}</div>)}</div></div>
      </div>
    </div>
  );
}

            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:16,fontFamily:"'Syne',sans-serif"}}>B</div>
            <span style={{color:"white",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif",letterSpacing:"-0.5px"}}>BetIQ</span>
            <div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",padding:"3px 8px",borderRadius:20}}><div style={{width:5,height:5,borderRadius:"50%",background:"#10b981"}} className="pulse"/><span style={{color:"#10b981",fontSize:10,fontWeight:700}}>LIVE</span></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Badge type={profile?.badge}/>
            <button onClick={()=>setShowNotifs(true)} style={{background:"none",border:"none",cursor:"pointer",position:"relative",padding:4}}>
              <span style={{fontSize:20}}>🔔</span>
              {unread>0&&<div style={{position:"absolute",top:0,right:0,background:"#f85149",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontSize:9,fontWeight:900}}>{unread}</span></div>}
            </button>
            <div style={{color:"#10b981",fontSize:13,fontWeight:700,background:"rgba(16,185,129,0.08)",padding:"7px 12px",borderRadius:10,border:"1px solid rgba(16,185,129,0.15)",fontFamily:"'Syne',sans-serif"}}>${profile?.wallet?.toFixed(2)||"0.00"}</div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 96px"}}>{screens[screen]}</div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"rgba(3,7,18,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--b)"}} className="safe-bottom">
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {nav.map(item=><button key={item.id} onClick={()=>setScreen(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:3,background:"none",border:"none",cursor:"pointer",color:screen===item.id?"#10b981":"var(--t3)",transition:"color 0.2s",position:"relative"}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{item.label}</span>
            {screen===item.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:"#10b981",borderRadius:"0 0 4px 4px"}}/>}
          </button>)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BetIQ/>);
</script>
</body>
</html>
