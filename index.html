// ── API FOOTBALL ──
async function fetchFixtures(leagueId, sport) {
  try {
    const today = new Date().toISOString().split('T')[0];
    const tomorrow = new Date(Date.now()+86400000).toISOString().split('T')[0];
    const dayAfter = new Date(Date.now()+172800000).toISOString().split('T')[0];

    // Fetch next 3 days of fixtures
    const res = await fetch(
      `https://v3.football.api-sports.io/fixtures?league=${leagueId}&season=2024&from=${today}&to=${dayAfter}&status=NS`,
      {
        headers:{
          "x-apisports-key": API_FOOTBALL_KEY,
          "x-rapidapi-host": "v3.football.api-sports.io"
        }
      }
    );
    const data = await res.json();
    if(!data.response || data.response.length === 0) return [];

    return data.response.slice(0,10).map(f=>({
      id: f.fixture.id,
      home: f.teams.home.name,
      away: f.teams.away.name,
      homeLogo: f.teams.home.logo,
      awayLogo: f.teams.away.logo,
      date: new Date(f.fixture.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),
      time: new Date(f.fixture.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      league: f.league.name,
      venue: f.fixture.venue?.name || "",
      status: f.fixture.status.short,
    }));
  } catch(e) {
    console.error("API-Football error:", e);
    return [];
  }
}

async function fetchTeamForm(teamId) {
  try {
    const res = await fetch(
      `https://v3.football.api-sports.io/fixtures?team=${teamId}&last=5&status=FT`,
      { headers:{"x-apisports-key":API_FOOTBALL_KEY,"x-rapidapi-host":"v3.football.api-sports.io"} }
    );
    const data = await res.json();
    if(!data.response) return null;
    const form = data.response.map(f=>{
      const isHome = f.teams.home.id === teamId;
      const goals = isHome ? f.goals.home : f.goals.away;
      const opp = isHome ? f.goals.away : f.goals.home;
      const result = goals > opp ? "W" : goals < opp ? "L" : "D";
      return result;
    });
    return form.join(" ");
  } catch { return null; }
}

async function fetchH2H(homeId, awayId) {
  try {
    const res = await fetch(
      `https://v3.football.api-sports.io/fixtures/headtohead?h2h=${homeId}-${awayId}&last=5`,
      { headers:{"x-apisports-key":API_FOOTBALL_KEY,"x-rapidapi-host":"v3.football.api-sports.io"} }
    );
    const data = await res.json();
    if(!data.response || data.response.length === 0) return null;
    let homeWins=0, awayWins=0, draws=0;
    data.response.forEach(f=>{
      if(f.score.fulltime.home > f.score.fulltime.away) homeWins++;
      else if(f.score.fulltime.home < f.score.fulltime.away) awayWins++;
      else draws++;
    });
    return `Last ${data.response.length} meetings: ${homeWins}W ${draws}D ${awayWins}L for home side`;
  } catch { return null; }
}

async function fetchInjuries(teamId, fixtureId) {
  try {
    const res = await fetch(
      `https://v3.football.api-sports.io/injuries?fixture=${fixtureId}`,
      { headers:{"x-apisports-key":API_FOOTBALL_KEY,"x-rapidapi-host":"v3.football.api-sports.io"} }
    );
    const data = await res.json();
    if(!data.response) return null;
    const teamInjuries = data.response.filter(i=>i.team.id===teamId);
    if(teamInjuries.length===0) return "No injuries reported";
    return teamInjuries.slice(0,3).map(i=>`${i.player.name} (${i.player.reason})`).join(", ");
  } catch { return null; }
}

function useAuth(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const fetchProfile=useCallback(async(id)=>{const{data}=await sb.from("profiles").select("*").eq("id",id).single();setProfile(data);setLoading(false);},[]);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);if(session?.user)fetchProfile(session.user.id);else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user??null);if(session?.user)fetchProfile(session.user.id);else{setProfile(null);setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[fetchProfile]);
  const refreshProfile=useCallback(async()=>{if(user){const{data}=await sb.from("profiles").select("*").eq("id",user.id).single();setProfile(data);}},[user]);
  return{user,profile,loading,refreshProfile};
}

// ── REAL MATCH SELECTOR ──
function MatchSelector({onSelect, selectedPicks, sport, setSport}){
  const[league,setLeague]=useState("Premier League");
  const[matches,setMatches]=useState([]);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[pickModal,setPickModal]=useState(null); // match that needs pick selection

  const footballLeagues=["Premier League","La Liga","Serie A","Champions League","Bundesliga"];
  const basketballLeagues=["NBA"];

  useEffect(()=>{
    // Set default league when sport changes
    if(sport==="Basketball") setLeague("NBA");
    else setLeague("Premier League");
  },[sport]);

  useEffect(()=>{loadMatches();},[league]);

  const loadMatches=async()=>{
    const leagueData=LEAGUES[league];
    if(!leagueData)return;
    setLoading(true);setError("");setMatches([]);
    const fixtures=await fetchFixtures(leagueData.id, leagueData.sport);
    if(fixtures.length===0){
      setError("No upcoming matches found. Showing sample matches.");
      // Fallback sample matches
      setMatches([
        {id:1,home:"Manchester City",away:"Arsenal",date:"Today",time:"20:00",league,venue:"Etihad Stadium"},
        {id:2,home:"Real Madrid",away:"Barcelona",date:"Tomorrow",time:"21:00",league,venue:"Santiago Bernabeu"},
        {id:3,home:"PSG",away:"Bayern Munich",date:"Sun 23 Mar",time:"21:00",league,venue:"Parc des Princes"},
        {id:4,home:"Liverpool",away:"Chelsea",date:"Mon 24 Mar",time:"20:00",league,venue:"Anfield"},
        {id:5,home:"Juventus",away:"AC Milan",date:"Tue 25 Mar",time:"20:45",league,venue:"Allianz Stadium"},
      ]);
    } else {
      setMatches(fixtures);
    }
    setLoading(false);
  };

  const isSelected=(matchId)=>selectedPicks.some(p=>p.matchId===matchId);

  const handleMatchTap=(match)=>{
    if(isSelected(match.id)){
      // Remove it
      onSelect(null, match);
    } else {
      // Show pick selection
      setPickModal(match);
    }
  };

  const handlePickSelect=(pick)=>{
    onSelect({...pickModal, pickType:pick}, pickModal);
    setPickModal(null);
  };

  const picks=sport==="Basketball"?BASKETBALL_PICKS:FOOTBALL_PICKS;
  const leagues=sport==="Football"?footballLeagues:basketballLeagues;

  return(
    <div>
      {/* Sport toggle */}
      <div style={{display:"flex",gap:4,background:"var(--surface)",padding:4,borderRadius:14,marginBottom:14,border:"1px solid var(--border)"}}>
        {["Football","Basketball"].map(s=><button key={s} onClick={()=>setSport(s)} style={{flex:1,padding:10,borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:sport===s?"linear-gradient(135deg,#10b981,#059669)":"transparent",color:sport===s?"white":"var(--text2)",transition:"all 0.2s"}}>{s==="Football"?"⚽":"🏀"} {s}</button>)}
      </div>

      {/* League tabs */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:14}}>
        {leagues.map(l=><button key={l} onClick={()=>setLeague(l)} className={`league-tab ${league===l?"active":""}`}>{LEAGUES[l]?.flag} {l}</button>)}
      </div>

      {/* Match list */}
      {loading?(
        <div style={{textAlign:"center",padding:32}}>
          <Spinner/>
          <p style={{color:"var(--text2)",fontSize:12,marginTop:8}}>Loading real {league} matches...</p>
        </div>
      ):(
        <div>
          {error&&<div style={{background:"rgba(240,180,41,0.08)",border:"1px solid rgba(240,180,41,0.2)",borderRadius:10,padding:"8px 12px",marginBottom:12}}><p style={{color:"#f0b429",fontSize:11}}>⚠️ {error}</p></div>}
          {matches.map(match=>{
            const sel=selectedPicks.find(p=>p.matchId===match.id);
            return(
              <div key={match.id} className={`match-card ${isSelected(match.id)?"selected":""}`} onClick={()=>handleMatchTap(match)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      {match.homeLogo&&<img src={match.homeLogo} style={{width:20,height:20,objectFit:"contain"}} onError={e=>e.target.style.display='none'}/>}
                      <span style={{color:"white",fontWeight:700,fontSize:14}}>{match.home}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:28}}>
                      <span style={{color:"var(--text2)",fontSize:12}}>vs</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                      {match.awayLogo&&<img src={match.awayLogo} style={{width:20,height:20,objectFit:"contain"}} onError={e=>e.target.style.display='none'}/>}
                      <span style={{color:"white",fontWeight:700,fontSize:14}}>{match.away}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",minWidth:80}}>
                    <div style={{color:"var(--green)",fontSize:12,fontWeight:700}}>{match.time}</div>
                    <div style={{color:"var(--text2)",fontSize:11,marginTop:2}}>{match.date}</div>
                    {isSelected(match.id)&&<div style={{marginTop:4,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:6,padding:"2px 6px"}}><span style={{color:"#10b981",fontSize:10,fontWeight:700}}>✓ Added</span></div>}
                  </div>
                </div>
                {sel&&<div style={{background:"rgba(16,185,129,0.08)",borderRadius:8,padding:"6px 10px",marginTop:6}}><span style={{color:"#10b981",fontSize:11,fontWeight:700}}>Pick: {sel.pickType}</span></div>}
                {match.venue&&<p style={{color:"var(--text3)",fontSize:10,marginTop:4}}>📍 {match.venue}</p>}
              </div>
            );
          })}
        </div>
      )}

      {/* Pick selection modal */}
      {pickModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(8px)"}} onClick={()=>setPickModal(null)}>
          <div style={{background:"var(--surface)",borderRadius:"24px 24px 0 0",padding:20,width:"100%",maxWidth:480,margin:"0 auto",border:"1px solid rgba(16,185,129,0.2)",borderBottom:"none",maxHeight:"70vh",overflow:"auto"}} className="slide-up" onClick={e=>e.stopPropagation()}>
            <div style={{marginBottom:16}}>
              <h3 style={{color:"white",fontWeight:900,fontSize:16,fontFamily:"'Syne',sans-serif"}}>{pickModal.home} vs {pickModal.away}</h3>
              <p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Select your pick:</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {picks.map(p=>(
                <button key={p} onClick={()=>handlePickSelect(p)} style={{padding:"10px 12px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontSize:12,fontWeight:600,cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                  {p}
                </button>
              ))}
            </div>
            <button onClick={()=>setPickModal(null)} style={{width:"100%",marginTop:14,padding:12,background:"transparent",border:"1px solid var(--border)",borderRadius:10,color:"var(--text2)",fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AIBuilder({user,profile,refreshProfile}){

  const[step,setStep]=useState(1);

  const loadSteps=["🔍 Fetching real team form data...","⚔️ Loading head-to-head records...","🏥 Checking injury reports...","📊 Running Poisson distribution model...","💹 Detecting market movement...","🧠 Kelly Criterion calculation...","⚡ Optimizing accumulator...","🎯 Finalizing confidence scores...","✅ Generating ultimate verdict..."];

  useEffect(()=>{if(loading){const iv=setInterval(()=>setLoadStep(s=>s<loadSteps.length-1?s+1:s),900);return()=>clearInterval(iv);}else setLoadStep(0);},[loading]);

  const handlePickSelect=(matchWithPick, match)=>{
    if(!matchWithPick){
      setSelectedPicks(prev=>prev.filter(p=>p.matchId!==match.id));
      return;
    }
    const existing=selectedPicks.find(p=>p.matchId===match.id);
    if(existing){
      setSelectedPicks(prev=>prev.map(p=>p.matchId===match.id?{...p,pickType:matchWithPick.pickType}:p));
    } else {
      setSelectedPicks(prev=>[...prev,{matchId:match.id,match:`${match.home} vs ${match.away}`,pick:matchWithPick.pickType,odds:"",fixtureId:match.id,home:match.home,away:match.away}]);

    // Fetch real data for selected matches

        home:pick.home,

        awayForm:null,
        h2h:null,

        awayInjuries:null

    const picksForAI=selectedPicks.map(p=>({match:p.match,pick:p.pick,odds:p.odds}));

        </div>
      </div>

      {/* Step indicator */}
      <div style={{display:"flex",gap:4,marginBottom:18}}>
        {["Select Matches","AI Analyzing","Results"].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"7px 4px",borderRadius:10,fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif",background:step===i+1?"linear-gradient(135deg,#10b981,#059669)":step>i+1?"rgba(16,185,129,0.1)":"var(--surface)",color:step===i+1?"white":step>i+1?"#10b981":"var(--text3)",border:`1px solid ${step===i+1?"transparent":step>i+1?"rgba(16,185,129,0.2)":"var(--border)"}`}}>{s}</div>)}
      </div>

  const[sellDesc,setSellDesc]=useState("");
  useEffect(()=>{fetchSlips();fetchPurchased();fetchMySaved();},[user]);
  const fetchSlips=async()=>{setLoading(true);const{data}=await sb.from("slips").select("*,profiles(username,badge,win_rate,roi,plan)").eq("is_public",true).order("confidence",{ascending:false});setSlips(data||[]);setLoading(false);};
  const fetchPurchased=async()=>{if(!user)return;const{data}=await sb.from("purchases").select("slip_id").eq("buyer_id",user.id);setPurchased((data||[]).map(p=>p.slip_id));};
  const fetchMySaved=async()=>{if(!user)return;const{data}=await sb.from("slips").select("*").eq("user_id",user.id).eq("is_public",false);setMySaved(data||[]);};
  const buy=async(slip)=>{
    if(!profile)return;
    if(profile.wallet<slip.price){alert("Insufficient wallet! Top up in Profile.");return;}
    const fee=FEES[profile.plan]*slip.price;
    await sb.from("purchases").insert({buyer_id:user.id,slip_id:slip.id,seller_id:slip.user_id,amount:slip.price,platform_fee:fee});
    await sb.from("profiles").update({wallet:profile.wallet-slip.price-fee}).eq("id",user.id);
    await sb.from("transactions").insert({user_id:user.id,type:"slip_buy",amount:slip.price+fee,fee,description:`Bought slip from ${slip.profiles?.username}`});
    setPurchased(p=>[...p,slip.id]);setUnlocked(slip);refreshProfile();
  };
  const listForSale=async()=>{
    if(!selSlip)return;
    if(profile?.plan==="Free"){alert("Upgrade to Pro or Elite to sell slips!");return;}
    await sb.from("slips").update({is_public:true,price:sellPrice,description:sellDesc}).eq("id",selSlip);
    setSelling(false);fetchSlips();alert("✅ Slip listed!");
  };
  const filtered=slips.filter(s=>filter==="All"||s.sport===filter);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Marketplace</h2><p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Wallet: <span style={{color:"var(--green)",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p></div>
        <button onClick={()=>setSelling(!selling)} style={{padding:"9px 14px",background:profile?.plan!=="Free"?"linear-gradient(135deg,#10b981,#059669)":"var(--surface2)",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Sell</button>
      </div>
      {selling&&(
        <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid rgba(16,185,129,0.2)",marginBottom:16}} className="fade-in">
          <p style={{color:"white",fontWeight:700,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>List a Slip For Sale</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <select value={selSlip} onChange={e=>setSelSlip(e.target.value)} className="select"><option value="">Select your saved slip...</option>{mySaved.map(s=><option key={s.id} value={s.id}>{s.sport} · {s.matches?.length} picks · {s.confidence}%</option>)}</select>
            <input value={sellPrice} onChange={e=>setSellPrice(parseFloat(e.target.value))} placeholder="Price (USD)" type="number" step="0.5" min="0.5" className="input"/>
            <input value={sellDesc} onChange={e=>setSellDesc(e.target.value)} placeholder="Short description..." className="input"/>
            <button onClick={listForSale} className="btn-primary">List For Sale</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["All","Football","Basketball"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===f?"var(--green)":"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:filter===f?"rgba(16,185,129,0.1)":"transparent",color:filter===f?"var(--green)":"var(--text2)"}}>{f}</button>)}
      </div>
      {loading?<Spinner/>:filtered.length===0?(
        <div style={{textAlign:"center",color:"var(--text2)",padding:60}}>
          <div style={{fontSize:48,marginBottom:12}}>🛒</div>
          <p style={{color:"white",fontWeight:700}}>No slips yet</p>
          <p style={{fontSize:13,marginTop:6}}>Build one with AI and sell it!</p>
        </div>
      ):filtered.map(slip=>(
        <div key={slip.id} style={{background:"var(--surface)",borderRadius:18,padding:16,border:slip.profiles?.badge==="elite"?"1px solid rgba(16,185,129,0.25)":"1px solid var(--border)",marginBottom:10}} className="fade-in">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:13,fontFamily:"'Syne',sans-serif"}}>{slip.profiles?.username?.slice(0,2).toUpperCase()||"??"}</div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{color:"white",fontWeight:700,fontSize:13}}>{slip.profiles?.username||"Tipster"}</span><Badge type={slip.profiles?.badge}/></div>
                <span style={{color:"var(--text2)",fontSize:11}}>ROI +{slip.profiles?.roi||0}% • {slip.sport}</span>
              </div>
            </div>
            <div style={{color:"var(--green)",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif"}}>${slip.price?.toFixed(2)}</div>
          </div>
          <div style={{marginBottom:12}}>
            {purchased.includes(slip.id)?slip.matches?.map((m,i)=><div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.1)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}><span style={{color:"#10b981",fontWeight:700}}>✓</span>{m}</div>):(
              <>
                <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}><span style={{color:"#10b981"}}>✓</span>{slip.matches?.[0]}</div>
                {slip.matches?.slice(1).map((_,i)=><div key={i} style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"transparent",filter:"blur(5px)",userSelect:"none"}}>🔒 Hidden pick #{i+2}</div>)}
              </>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div><div style={{color:"#10b981",fontWeight:900,fontSize:14}}>{slip.confidence}%</div><div style={{color:"var(--text3)",fontSize:9}}>CONF</div></div>
              <div><div style={{color:"#f0b429",fontWeight:900,fontSize:14}}>@{slip.combined_odds?.toFixed(1)}</div><div style={{color:"var(--text3)",fontSize:9}}>ODDS</div></div>
              <RiskTag r={slip.risk_level}/>
            </div>
            {purchased.includes(slip.id)?<span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 14px",borderRadius:20}}>✓ Owned</span>
            :slip.user_id===user?.id?<span style={{color:"var(--text2)",fontSize:12,background:"var(--surface2)",padding:"6px 14px",borderRadius:20}}>Your slip</span>
            :<button onClick={()=>buy(slip)} className="btn-primary" style={{width:"auto",padding:"8px 18px",fontSize:13}}>Buy ${slip.price?.toFixed(2)}</button>}
          </div>
          {slip.description&&<p style={{color:"var(--text2)",fontSize:11,marginTop:8,fontStyle:"italic"}}>"{slip.description}"</p>}
        </div>
      ))}
      {unlocked&&purchased.includes(unlocked.id)&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(8px)"}} onClick={()=>setUnlocked(null)}>
          <div style={{background:"var(--surface)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,margin:"0 auto",border:"1px solid rgba(16,185,129,0.25)",borderBottom:"none"}} className="slide-up" onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:56,marginBottom:8}}>🎉</div><h3 style={{color:"white",fontWeight:900,fontSize:22,fontFamily:"'Syne',sans-serif"}}>Slip Unlocked!</h3><p style={{color:"var(--text2)",fontSize:13,marginTop:4}}>by {unlocked.profiles?.username} • {unlocked.confidence}% AI confidence</p></div>
            {unlocked.matches?.map((m,i)=><div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",gap:12}}><span style={{color:"#10b981",fontWeight:900}}>#{i+1}</span><span style={{color:"white",fontSize:13}}>{m}</span></div>)}
            <button onClick={()=>setUnlocked(null)} className="btn-primary" style={{marginTop:16}}>Got it — Good luck! 🍀</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── PLANS ──
function Plans({user,profile,refreshProfile}){
  const[upgrading,setUpgrading]=useState(null);
  const plans=[
    {name:"Free",price:0,color:"#6b7280",badge:"none",icon:"🌱",features:["3 AI analyses/day","Real live matches","Buy slips (5% fee)","View leaderboard"]},
    {name:"Pro",price:9.99,color:"#f0b429",badge:"verified",icon:"🔥",features:["Unlimited AI analyses","Sell up to 20 slips/week","Buy slips (2% fee)","Pro badge","Advanced analytics"]},
    {name:"Elite",price:24.99,color:"#10b981",badge:"elite",icon:"⚡",features:["Everything in Pro","Unlimited selling","Zero platform fees","Elite badge + promo","Featured on leaderboard","Founder direct support"]},
  ];
  const upgrade=async(plan)=>{
    if(!user||!profile)return;
    if(plan.name===profile.plan)return;
    if(plan.price>0&&profile.wallet<plan.price){alert(`Need $${plan.price}. Top up in Profile!`);return;}
    setUpgrading(plan.name);
    await sb.from("profiles").update({plan:plan.name,badge:plan.badge,wallet:plan.price>0?profile.wallet-plan.price:profile.wallet}).eq("id",user.id);
    if(plan.price>0)await sb.from("transactions").insert({user_id:user.id,type:"subscription",amount:plan.price,fee:plan.price,description:`Upgraded to ${plan.name}`});
    await refreshProfile();setUpgrading(null);alert(`✅ Welcome to ${plan.name}!`);
  };
  return(
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Plans</h2><p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Current: <span style={{color:"var(--green)",fontWeight:700}}>{profile?.plan||"Free"}</span> • Wallet: <span style={{color:"var(--green)",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p></div>
      {plans.map(plan=>(
        <div key={plan.name} style={{background:profile?.plan===plan.name?"linear-gradient(135deg,var(--surface),rgba(16,185,129,0.04))":"var(--surface)",borderRadius:20,padding:20,border:profile?.plan===plan.name?"2px solid rgba(16,185,129,0.4)":"2px solid var(--border)",marginBottom:14}}>
          {plan.name==="Pro"&&<div style={{display:"inline-flex",padding:"4px 12px",borderRadius:20,background:"rgba(240,180,41,0.1)",color:"#f0b429",fontSize:11,fontWeight:900,border:"1px solid rgba(240,180,41,0.2)",marginBottom:12}}>⭐ MOST POPULAR</div>}
          {plan.name==="Elite"&&<div style={{display:"inline-flex",padding:"4px 12px",borderRadius:20,background:"rgba(16,185,129,0.1)",color:"#10b981",fontSize:11,fontWeight:900,border:"1px solid rgba(16,185,129,0.2)",marginBottom:12}}>👑 BEST VALUE</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:20}}>{plan.icon}</span><h3 style={{color:"white",fontSize:22,fontWeight:900}}>{plan.name}</h3></div>
              <div style={{fontWeight:900,fontSize:28,fontFamily:"'Syne',sans-serif",color:plan.color}}>{plan.price===0?"FREE":`$${plan.price}`}{plan.price>0&&<span style={{fontSize:13,fontWeight:400,color:"var(--text2)"}}>/month</span>}</div>
            </div>
            {profile?.plan===plan.name&&<span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 14px",borderRadius:20}}>✓ Active</span>}
          </div>
          <div style={{marginBottom:18}}>{plan.features.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",color:"#d1d5db",fontSize:13}}><span style={{color:plan.color,fontWeight:700}}>✓</span>{f}</div>)}</div>
          <button onClick={()=>upgrade(plan)} disabled={profile?.plan===plan.name||upgrading===plan.name} style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:profile?.plan===plan.name?"default":"pointer",fontWeight:700,fontSize:14,fontFamily:"'Syne',sans-serif",background:profile?.plan===plan.name?"rgba(255,255,255,0.05)":plan.price===0?"var(--surface2)":"linear-gradient(135deg,#10b981,#059669)",color:profile?.plan===plan.name?"var(--text2)":"white",opacity:upgrading===plan.name?0.7:1}}>
            {upgrading===plan.name?"Processing...":profile?.plan===plan.name?"✓ Current Plan":`Upgrade to ${plan.name}${plan.price>0?` — $${plan.price}`:""}`}
          </button>
        </div>
      ))}
    </div>
  );
}

        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {[{l:"Wallet",v:`$${profile?.wallet?.toFixed(0)||0}`,c:"#10b981"},{l:"Win Rate",v:`${profile?.win_rate||0}%`,c:"#f0b429"},{l:"Streak",v:`${profile?.streak||0}🔥`,c:"#f97316"},{l:"Sold",v:profile?.total_sold||0,c:"#58a6ff"}].map(item=><div key={item.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:"10px 6px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:15,fontFamily:"'Syne',sans-serif"}}>{item.v}</div><div style={{color:"var(--text3)",fontSize:10,marginTop:2}}>{item.l}</div></div>)}
        </div>
      </div>
      <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid var(--border)",marginBottom:12}}>
        <p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>💳 Top Up Wallet</p>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {[5,10,20,50,100,200].map(a=><button key={a} onClick={()=>setTopUp(a)} style={{flex:1,minWidth:44,padding:"9px 4px",borderRadius:10,border:`1px solid ${topUp===a?"var(--green)":"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:topUp===a?"rgba(16,185,129,0.1)":"var(--surface2)",color:topUp===a?"var(--green)":"var(--text2)"}}>${a}</button>)}
        </div>
        <button onClick={addFunds} className="btn-primary">Add ${topUp} to Wallet</button>
        <p style={{color:"var(--text3)",fontSize:10,textAlign:"center",marginTop:8}}>* Flutterwave M-Pesa/Tigo/Airtel coming soon</p>
      </div>
      <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid var(--border)"}}>
        <p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>Transaction History</p>
        {history.length===0?<p style={{color:"var(--text2)",fontSize:12,textAlign:"center",padding:"16px 0"}}>No transactions yet</p>
        :history.map(tx=><div key={tx.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>{txI[tx.type]||"💫"}</span>
            <div><p style={{color:"white",fontSize:12,fontWeight:600}}>{tx.description}</p><p style={{color:"var(--text3)",fontSize:11}}>{new Date(tx.created_at).toLocaleDateString()}</p></div>
          </div>
          <span style={{fontWeight:700,fontSize:13,color:txC[tx.type]||"white"}}>{["topup","slip_sale"].includes(tx.type)?"+":"-"}${tx.amount?.toFixed(2)}</span>
        </div>)}
      </div>
    </div>
  );
}

// ── MAIN APP ──
function BetIQ(){
  const{user,profile,loading,refreshProfile}=useAuth();
  const[screen,setScreen]=useState("builder");
  const nav=[{id:"builder",icon:"🤖",label:"AI"},{id:"market",icon:"🛒",label:"Market"},{id:"board",icon:"🏆",label:"Rankings"},{id:"plans",icon:"⚡",label:"Plans"},{id:"profile",icon:"👤",label:"Profile"}];
  if(loading)return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,fontWeight:900,color:"white",fontFamily:"'Syne',sans-serif",boxShadow:"0 20px 60px rgba(16,185,129,0.3)"}} className="glow">B</div>
      <div style={{width:32,height:32,border:"2px solid rgba(16,185,129,0.2)",borderTopColor:"#10b981",borderRadius:"50%"}} className="spin"/>
    </div>
  );
  if(!user)return<AuthScreen/>;
  const screens={
    builder:<AIBuilder user={user} profile={profile} refreshProfile={refreshProfile}/>,
    market:<Marketplace user={user} profile={profile} refreshProfile={refreshProfile}/>,
    board:<Leaderboard/>,
    plans:<Plans user={user} profile={profile} refreshProfile={refreshProfile}/>,
    profile:<Profile user={user} profile={profile} refreshProfile={refreshProfile}/>,
  };
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{position:"sticky",top:0,zIndex:40,background:"rgba(3,7,18,0.92)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid var(--border)"}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:16,fontFamily:"'Syne',sans-serif"}}>B</div>
            <span style={{color:"white",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif",letterSpacing:"-0.5px"}}>BetIQ</span>
            <div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",padding:"3px 8px",borderRadius:20}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:"#10b981"}} className="pulse"/>
              <span style={{color:"#10b981",fontSize:10,fontWeight:700}}>LIVE</span>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Badge type={profile?.badge}/>
            <div style={{color:"#10b981",fontSize:13,fontWeight:700,background:"rgba(16,185,129,0.08)",padding:"7px 12px",borderRadius:10,border:"1px solid rgba(16,185,129,0.15)",fontFamily:"'Syne',sans-serif"}}>${profile?.wallet?.toFixed(2)||"0.00"}</div>
          </div>
        </div>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 96px"}}>{screens[screen]}</div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"rgba(3,7,18,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--border)"}} className="safe-bottom">
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {nav.map(item=><button key={item.id} onClick={()=>setScreen(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:3,background:"none",border:"none",cursor:"pointer",color:screen===item.id?"#10b981":"var(--text3)",transition:"color 0.2s",position:"relative"}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{item.label}</span>
            {screen===item.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:"#10b981",borderRadius:"0 0 4px 4px"}}/>}
          </button>)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BetIQ/>);
</script>
</body>
