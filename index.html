async function fetchRealMatches(competition){
  try{
    const compId=COMPETITION_IDS[competition]||"PL";
    const today=new Date().toISOString().split('T')[0];
    const nextWeek=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
    const res=await fetch(
      `https://api.football-data.org/v4/competitions/${compId}/matches?dateFrom=${today}&dateTo=${nextWeek}&status=SCHEDULED`,
      {headers:{"X-Auth-Token":FDATA_KEY}}
    );
    const data=await res.json();
    if(!data.matches||data.matches.length===0)return[];
    return data.matches.slice(0,10).map(m=>({
      id:m.id,
      home:m.homeTeam.shortName||m.homeTeam.name,
      away:m.awayTeam.shortName||m.awayTeam.name,
      homeFull:m.homeTeam.name,
      awayFull:m.awayTeam.name,
      date:new Date(m.utcDate).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}),
      time:new Date(m.utcDate).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      competition:m.competition.name,
      matchday:`Matchday ${m.matchday||""}`,
      status:m.status,
    }));
  }catch(e){
    console.error("Football-data error:",e);
    return[];
  }
}

async function ultimateAI(picks,sport,stake,userId){

// ── AUTH HOOK ──
function useAuth(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const fp=useCallback(async(id)=>{const{data}=await sb.from("profiles").select("*").eq("id",id).single();setProfile(data);setLoading(false);},[]);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user??null);if(session?.user)fp(session.user.id);else{setProfile(null);setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[fp]);
  const refresh=useCallback(async()=>{if(user){const{data}=await sb.from("profiles").select("*").eq("id",user.id).single();setProfile(data);}},[user]);
  return{user,profile,loading,refresh};
}

  const[mode,setMode]=useState("login");

  const[pw,setPw]=useState("");

    if(!email||!pw){setMsg({text:"Please fill all fields",type:"error"});return;}
    setLoading(true);setMsg({text:"",type:""});

      const{error}=await sb.auth.signInWithPassword({email,password:pw});

      if(!uname){setMsg({text:"Please enter a username",type:"error"});setLoading(false);return;}
      const{data,error}=await sb.auth.signUp({email,password:pw});

      if(data.user){
