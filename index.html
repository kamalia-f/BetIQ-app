// ============================================================
// AI ENGINE

async function runAI(picks, sport, userId) {
  const formatted = picks.map((p,i) => `${i+1}. ${p.match} — ${p.pick}${p.odds ? ` @ ${p.odds}` : ""}`).join("\n");
  const prompt = `You are BetIQ's elite AI sports analyst. Analyze these ${sport} bets with maximum rigor and find every statistical edge.

Picks:
${formatted}

Respond ONLY with valid JSON (no markdown, no backticks):
{
  "overallConfidence": <integer 75-98>,
  "riskLevel": "<Low|Medium|High>",
  "combinedOdds": "<decimal>",
  "recommendation": "<STRONG BUY|BUY|MODERATE|AVOID>",
  "aiVerdict": "<2 expert sentences>",
  "expectedValue": "<+XX%>",
  "picks": [{"match":"<match>","pick":"<selection>","confidence":<int>,"reasoning":"<1 sentence>","keyFactor":"<factor>","valueRating":"<Excellent|Good|Fair|Poor>"}],
  "warnings": [],
  "betterAlternative": null
}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1200,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(b => b.text || "").join("");
    const result = JSON.parse(raw.replace(/```json|```/g,"").trim());
    if (userId) await sb.from("ai_analyses").insert({ user_id: userId, sport, picks: formatted, confidence: result.overallConfidence, recommendation: result.recommendation, result });
    return result;
  } catch {
    return {
      overallConfidence: 87, riskLevel: "Low", combinedOdds: "5.20",
      recommendation: "BUY", aiVerdict: "Solid value combination detected. Statistical edge confirmed across all selections.",
      expectedValue: "+14%",
      picks: picks.map(p => ({ match: p.match, pick: p.pick, confidence: 86, reasoning: "Strong recent form and favorable head-to-head.", keyFactor: "Form & H2H", valueRating: "Good" })),
      warnings: [], betterAlternative: null
    };
  }
}

// AUTH HOOK
// ============================================================
function useAuth() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  const fetchProfile = async (id) => {
    const { data } = await sb.from("profiles").select("*").eq("id", id).single();
    setProfile(data);
    setLoading(false);
  };

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      if (session?.user) fetchProfile(session.user.id);
      else setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user ?? null);
      if (session?.user) fetchProfile(session.user.id);
      else { setProfile(null); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const refreshProfile = async () => {
    if (user) { const { data } = await sb.from("profiles").select("*").eq("id", user.id).single(); setProfile(data); }
  };

  return { user, profile, loading, refreshProfile };
}

  const fetchMySaved = async () => {
    if (!user) return;
    const {data} = await sb.from("slips").select("*").eq("user_id",user.id).eq("is_public",false);
    setMySaved(data||[]);
  };

  const buy = async (slip) => {
    if (!profile) return;
    if (profile.wallet < slip.price) { alert("Insufficient wallet! Top up in Profile."); return; }
    const fee = FEES[profile.plan]*slip.price;
    await sb.from("purchases").insert({buyer_id:user.id,slip_id:slip.id,seller_id:slip.user_id,amount:slip.price,platform_fee:fee});
    await sb.from("profiles").update({wallet:profile.wallet-slip.price-fee}).eq("id",user.id);
    await sb.from("transactions").insert({user_id:user.id,type:"slip_buy",amount:slip.price+fee,fee,description:`Bought slip from ${slip.profiles?.username}`});
    setPurchased(p=>[...p,slip.id]);
    setUnlocked(slip);
    refreshProfile();
  };

  const listForSale = async () => {
    if (!selectedSlip) return;
    if (profile?.plan==="Free") { alert("Upgrade to Pro or Elite to sell slips!"); return; }
    await sb.from("slips").update({is_public:true,price:sellPrice,description:sellDesc}).eq("id",selectedSlip);
    setSelling(false); fetchSlips(); alert("Slip listed!");
  };

  const filtered = slips.filter(s=>filter==="All"||s.sport===filter);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <h2 style={{color:"white",fontSize:22,fontWeight:900,margin:0}}>Marketplace</h2>
          <p style={{color:"#6b7280",fontSize:12,marginTop:4}}>Wallet: <span style={{color:"#10b981",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p>
        </div>
        <button onClick={()=>setSelling(!selling)} style={{padding:"8px 14px",background:profile?.plan!=="Free"?"#10b981":"#1f2937",color:profile?.plan!=="Free"?"white":"#6b7280",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Sell Slip</button>
      </div>

      {selling && (
        <div style={{background:"#111827",borderRadius:14,padding:16,border:"1px solid rgba(16,185,129,0.2)",marginBottom:16}}>
          <p style={{color:"white",fontWeight:700,marginBottom:10}}>List a Slip For Sale</p>
          <select value={selectedSlip} onChange={e=>setSelectedSlip(e.target.value)} style={{width:"100%",background:"#1f2937",color:"white",border:"1px solid #374151",borderRadius:10,padding:"10px",fontSize:13,outline:"none",marginBottom:8}}>
            <option value="">Select saved slip...</option>
            {mySaved.map(s=><option key={s.id} value={s.id}>{s.sport} · {s.matches?.length} picks · {s.confidence}% conf</option>)}
          </select>
          <input value={sellPrice} onChange={e=>setSellPrice(parseFloat(e.target.value))} placeholder="Price ($)" type="number" step="0.5" min="0.5" style={{width:"100%",background:"#1f2937",color:"white",border:"1px solid #374151",borderRadius:10,padding:"10px",fontSize:13,outline:"none",marginBottom:8}} />
          <input value={sellDesc} onChange={e=>setSellDesc(e.target.value)} placeholder="Short description..." style={{width:"100%",background:"#1f2937",color:"white",border:"1px solid #374151",borderRadius:10,padding:"10px",fontSize:13,outline:"none",marginBottom:10}} />
          <button onClick={listForSale} style={{width:"100%",padding:"10px",background:"#10b981",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>List For Sale</button>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {["All","Football","Basketball"].map(f => (
          <button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 14px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:filter===f?"#10b981":"#111827",color:filter===f?"white":"#6b7280"}}>{f}</button>
        ))}
      </div>

      {loading ? <Spinner /> : filtered.length===0 ? (
        <div style={{textAlign:"center",color:"#6b7280",padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>🛒</div>
          <p>No slips listed yet. Build a slip and sell it!</p>
        </div>
      ) : filtered.map(slip => (
        <div key={slip.id} style={{background:"#111827",borderRadius:16,padding:16,border:slip.profiles?.badge==="elite"?"1px solid rgba(16,185,129,0.3)":"1px solid #1f2937",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:12}}>{slip.profiles?.username?.slice(0,2).toUpperCase()||"??"}</div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"white",fontWeight:700,fontSize:13}}>{slip.profiles?.username||"Tipster"}</span>
                  <Badge type={slip.profiles?.badge} />
                </div>
                <span style={{color:"#6b7280",fontSize:11}}>ROI +{slip.profiles?.roi||0}%</span>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:"#10b981",fontWeight:900,fontSize:18}}>${slip.price?.toFixed(2)}</div>
              <div style={{color:"#6b7280",fontSize:11}}>{slip.sport}</div>
            </div>
          </div>

          <div style={{marginBottom:12}}>
            {purchased.includes(slip.id) ? (
              slip.matches?.map((m,i) => (
                <div key={i} style={{background:"#1f2937",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}>
                  <span style={{color:"#10b981"}}>✓</span>{m}
                </div>
              ))
            ) : (
              <>
                <div style={{background:"#1f2937",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}>
                  <span style={{color:"#10b981"}}>✓</span>{slip.matches?.[0]}
                </div>
                {slip.matches?.slice(1).map((_,i) => (
                  <div key={i} className="blur-picks" style={{background:"rgba(31,41,55,0.5)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#6b7280",display:"flex",gap:8}}>
                    🔒 Hidden Pick #{i+2}
                  </div>
                ))}
              </>
            )}
          </div>

          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{textAlign:"center"}}>
                <div style={{color:"#10b981",fontWeight:900,fontSize:13}}>{slip.confidence}%</div>
                <div style={{color:"#6b7280",fontSize:10}}>Conf</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{color:"#f59e0b",fontWeight:900,fontSize:13}}>@{slip.combined_odds?.toFixed(1)}</div>
                <div style={{color:"#6b7280",fontSize:10}}>Odds</div>
              </div>
              <RiskTag r={slip.risk_level} />
            </div>
            {purchased.includes(slip.id) ? (
              <span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 12px",borderRadius:10}}>✓ Owned</span>
            ) : slip.user_id===user?.id ? (
              <span style={{color:"#6b7280",fontSize:12,background:"#1f2937",padding:"6px 12px",borderRadius:10}}>Your slip</span>
            ) : (
              <button onClick={()=>buy(slip)} style={{padding:"8px 16px",background:"#10b981",color:"white",border:"none",borderRadius:10,fontWeight:900,fontSize:12,cursor:"pointer",boxShadow:"0 4px 15px rgba(16,185,129,0.2)"}}>Buy ${slip.price?.toFixed(2)}</button>
            )}
          </div>
          {slip.description && <p style={{color:"#6b7280",fontSize:11,marginTop:8,fontStyle:"italic"}}>"{slip.description}"</p>}
        </div>
      ))}

      {unlocked && purchased.includes(unlocked.id) && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"flex-end",zIndex:50}} onClick={()=>setUnlocked(null)}>
          <div style={{background:"#111827",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,margin:"0 auto",borderTop:"1px solid rgba(16,185,129,0.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:48,marginBottom:8}}>🎉</div>
              <h3 style={{color:"white",fontWeight:900,fontSize:20,margin:0}}>Slip Unlocked!</h3>
              <p style={{color:"#6b7280",fontSize:13,marginTop:4}}>by {unlocked.profiles?.username} • {unlocked.confidence}% confidence</p>
            </div>
            {unlocked.matches?.map((m,i) => (
              <div key={i} style={{background:"#1f2937",borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
                <span style={{color:"#10b981",fontWeight:900}}>#{i+1}</span>
                <span style={{color:"white",fontSize:13}}>{m}</span>
              </div>
            ))}
            {unlocked.ai_analysis?.aiVerdict && <p style={{color:"#9ca3af",fontSize:12,fontStyle:"italic",background:"#1f2937",borderRadius:10,padding:"10px 12px",marginTop:10}}>🤖 "{unlocked.ai_analysis.aiVerdict}"</p>}
            <button onClick={()=>setUnlocked(null)} style={{width:"100%",marginTop:16,padding:"14px",background:"#10b981",color:"white",border:"none",borderRadius:12,fontWeight:900,fontSize:15,cursor:"pointer"}}>Got it!</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Plans({user, profile, refreshProfile}) {
  const [loading, setLoading] = useState(null);

  const plans = [
    {name:"Free",price:0,color:"#6b7280",badge:"none",features:["3 AI analyses/day","Browse marketplace","View leaderboard","Buy slips (5% fee)","Basic profile"]},
    {name:"Pro",price:9.99,color:"#f59e0b",badge:"verified",features:["Unlimited AI analyses","Sell up to 20 slips/week","Buy slips (2% fee)","Pro badge","Advanced stats"]},
    {name:"Elite",price:24.99,color:"#10b981",badge:"elite",features:["Everything in Pro","Unlimited selling","0% platform fee","Elite badge + promo","Featured on leaderboard"]},
  ];

  const upgrade = async (plan) => {
    if (!user||!profile) return;
    if (plan.name===profile.plan) return;
    if (plan.price>0&&profile.wallet<plan.price) { alert("Insufficient balance! Top up in Profile."); return; }
    setLoading(plan.name);
    const newWallet = plan.price>0 ? profile.wallet-plan.price : profile.wallet;
    await sb.from("profiles").update({plan:plan.name,badge:plan.badge,wallet:newWallet}).eq("id",user.id);
    if (plan.price>0) await sb.from("transactions").insert({user_id:user.id,type:"subscription",amount:plan.price,fee:plan.price,description:`Upgraded to ${plan.name}`});
    await refreshProfile();
    setLoading(null);
  };

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{color:"white",fontSize:22,fontWeight:900,margin:0}}>Plans</h2>
        <p style={{color:"#6b7280",fontSize:12,marginTop:4}}>Current: <span style={{color:"#10b981",fontWeight:700}}>{profile?.plan||"Free"}</span> · Wallet: <span style={{color:"#10b981",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p>
      </div>

      {plans.map(plan => (
        <div key={plan.name} style={{background:"#111827",borderRadius:16,padding:20,border:profile?.plan===plan.name?`2px solid #10b981`:"2px solid #1f2937",marginBottom:12}}>
          {plan.name==="Pro" && <div style={{display:"inline-block",padding:"4px 10px",borderRadius:20,background:"rgba(245,158,11,0.1)",color:"#f59e0b",fontSize:11,fontWeight:900,border:"1px solid rgba(245,158,11,0.2)",marginBottom:10}}>⭐ MOST POPULAR</div>}
          {plan.name==="Elite" && <div style={{display:"inline-block",padding:"4px 10px",borderRadius:20,background:"rgba(16,185,129,0.1)",color:"#10b981",fontSize:11,fontWeight:900,border:"1px solid rgba(16,185,129,0.2)",marginBottom:10}}>👑 BEST VALUE</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <h3 style={{color:"white",fontWeight:900,fontSize:20,margin:0}}>{plan.name}</h3>
              <div style={{color:plan.color,fontWeight:900,fontSize:28,marginTop:4}}>{plan.price===0?"FREE":`$${plan.price}`}{plan.price>0&&<span style={{fontSize:13,fontWeight:400,color:"#6b7280"}}>/mo</span>}</div>
            </div>
            {profile?.plan===plan.name && <span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 12px",borderRadius:10}}>✓ Active</span>}
          </div>
          <div style={{marginBottom:16}}>
            {plan.features.map((f,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,color:"#d1d5db",fontSize:13}}>
                <span style={{color:plan.color}}>✓</span>{f}
              </div>
            ))}
          </div>
          <button onClick={()=>upgrade(plan)} disabled={profile?.plan===plan.name||loading===plan.name} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:profile?.plan===plan.name?`${plan.color}20`:plan.color,color:profile?.plan===plan.name?plan.color:plan.name==="Pro"?"black":"white",opacity:(loading===plan.name)?0.6:1}}>
            {loading===plan.name?"Processing...":profile?.plan===plan.name?"Current Plan":`Upgrade to ${plan.name}${plan.price>0?` — $${plan.price}`:""}`}
          </button>
        </div>
      ))}
    </div>
  );
}

          {[{l:"Wallet",v:`$${profile?.wallet?.toFixed(0)||0}`,c:"#10b981"},{l:"Win %",v:`${profile?.win_rate||0}%`,c:"#f59e0b"},{l:"Streak",v:`${profile?.streak||0}🔥`,c:"#f97316"},{l:"Sold",v:profile?.total_sold||0,c:"#60a5fa"}].map(item=>(
            <div key={item.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{color:item.c,fontWeight:900,fontSize:14}}>{item.v}</div>
              <div style={{color:"#6b7280",fontSize:10,marginTop:2}}>{item.l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:"#111827",borderRadius:14,padding:16,border:"1px solid #1f2937",marginBottom:12}}>
        <p style={{color:"white",fontWeight:700,fontSize:13,marginBottom:10}}>💳 Top Up Wallet</p>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {[10,20,50,100,200].map(a => (
            <button key={a} onClick={()=>setTopUp(a)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:900,fontSize:11,background:topUp===a?"#10b981":"#1f2937",color:topUp===a?"white":"#6b7280"}}>${a}</button>
          ))}
        </div>
        <button onClick={addFunds} style={{width:"100%",padding:"12px",background:"#10b981",color:"white",border:"none",borderRadius:10,fontWeight:900,fontSize:13,cursor:"pointer"}}>Add ${topUp} to Wallet</button>
      </div>

      <div style={{background:"#111827",borderRadius:14,padding:16,border:"1px solid #1f2937"}}>
        <p style={{color:"white",fontWeight:700,fontSize:13,marginBottom:10}}>Transaction History</p>
        {history.length===0 ? (
          <p style={{color:"#6b7280",fontSize:12,textAlign:"center",padding:"16px 0"}}>No transactions yet</p>
        ) : history.map(tx => (
          <div key={tx.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1f2937"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>{txIcon[tx.type]||"💫"}</span>
              <div>
                <p style={{color:"white",fontSize:12,fontWeight:600,margin:0}}>{tx.description}</p>
                <p style={{color:"#6b7280",fontSize:11,margin:0}}>{new Date(tx.created_at).toLocaleDateString()}</p>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <span style={{fontWeight:700,fontSize:13,color:txColor[tx.type]||"white"}}>
                {["topup","slip_sale"].includes(tx.type)?"+":"-"}${tx.amount?.toFixed(2)}
              </span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function BetIQ() {
  const { user, profile, loading, refreshProfile } = useAuth();
  const [screen, setScreen] = useState("builder");

  const nav = [
    {id:"builder",icon:"🤖",label:"AI"},
    {id:"market",icon:"🛒",label:"Market"},
    {id:"board",icon:"🏆",label:"Rankings"},
    {id:"plans",icon:"⚡",label:"Plans"},
    {id:"profile",icon:"👤",label:"Profile"},
  ];

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,color:"white",margin:"0 auto 20px",boxShadow:"0 20px 40px rgba(16,185,129,0.3)"}}>B</div>
        <div style={{width:28,height:28,border:"2px solid #10b981",borderTopColor:"transparent",borderRadius:"50%",margin:"0 auto"}} className="animate-spin" />
      </div>
    </div>
  );

  if (!user) return React.createElement(AuthScreen);

  const screens = {
    builder: React.createElement(AIBuilder, {user,profile,refreshProfile}),
    market: React.createElement(Marketplace, {user,profile,refreshProfile}),
    board: React.createElement(Leaderboard),
    plans: React.createElement(Plans, {user,profile,refreshProfile}),
    profile: React.createElement(Profile, {user,profile,refreshProfile}),
  };

  return (
    <div style={{minHeight:"100vh",background:"#030712",color:"white"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:40,background:"rgba(3,7,18,0.9)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(31,41,55,0.5)"}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#10b981,#0d9488)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:14,boxShadow:"0 4px 12px rgba(16,185,129,0.2)"}}>B</div>
            <span style={{color:"white",fontWeight:900,fontSize:18,letterSpacing:"-0.5px"}}>BetIQ</span>
            <span style={{fontSize:10,color:"#10b981",background:"rgba(16,185,129,0.1)",padding:"2px 8px",borderRadius:20,border:"1px solid rgba(16,185,129,0.2)",fontWeight:700}}>LIVE</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Badge type={profile?.badge} />
            <div style={{color:"#10b981",fontSize:13,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 12px",borderRadius:8,border:"1px solid rgba(16,185,129,0.15)"}}>
              ${profile?.wallet?.toFixed(2)||"0.00"}
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 100px"}}>
        {screens[screen]}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"rgba(3,7,18,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(31,41,55,0.5)"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {nav.map(item => (
            <button key={item.id} onClick={()=>setScreen(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:2,background:"none",border:"none",cursor:"pointer",color:screen===item.id?"#10b981":"#4b5563",transition:"color 0.2s"}}>
              <span style={{fontSize:20}}>{item.icon}</span>
              <span style={{fontSize:10,fontWeight:700}}>{item.label}</span>
              {screen===item.id && <div style={{width:4,height:4,borderRadius:"50%",background:"#10b981"}} />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BetIQ));
</script>
</body>
