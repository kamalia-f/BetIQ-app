// ── AUTH HOOK ──
function useAuth(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const fetchProfile=useCallback(async(id)=>{const{data}=await sb.from("profiles").select("*").eq("id",id).single();setProfile(data);setLoading(false);},[]);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);if(session?.user)fetchProfile(session.user.id);else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user??null);if(session?.user)fetchProfile(session.user.id);else{setProfile(null);setLoading(false);}});
    return()=>subscription.unsubscribe();
  },[fetchProfile]);
  const refreshProfile=useCallback(async()=>{if(user){const{data}=await sb.from("profiles").select("*").eq("id",user.id).single();setProfile(data);}},[user]);
  return{user,profile,loading,refreshProfile};
}

          <span style={{color:"var(--text2)",fontSize:12}}>15-Factor Ultimate Analysis • {profile?.plan==="Free"?"3/day free":"Unlimited"}</span>
        </div>
      </div>

      <div style={{display:"flex",gap:4,marginBottom:18}}>
        {["Build Slip","AI Analyzing","Results"].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"7px 4px",borderRadius:10,fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif",background:step===i+1?"linear-gradient(135deg,#10b981,#059669)":step>i+1?"rgba(16,185,129,0.1)":"var(--surface)",color:step===i+1?"white":step>i+1?"#10b981":"var(--text3)",border:`1px solid ${step===i+1?"transparent":step>i+1?"rgba(16,185,129,0.2)":"var(--border)"}`}}>{s}</div>)}

      <div style={{display:"flex",gap:4,background:"var(--surface)",padding:4,borderRadius:14,marginBottom:16,border:"1px solid var(--border)"}}>
        {["Football","Basketball"].map(s=><button key={s} onClick={()=>{setSport(s);setAnalysis(null);setStep(1);}} style={{flex:1,padding:11,borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:sport===s?"linear-gradient(135deg,#10b981,#059669)":"transparent",color:sport===s?"white":"var(--text2)",transition:"all 0.2s"}}>{s==="Football"?"⚽":"🏀"} {s}</button>)}
      </div>

      <div style={{background:"linear-gradient(135deg,rgba(16,185,129,0.08),rgba(5,150,105,0.04))",border:"1px solid rgba(16,185,129,0.15)",borderRadius:12,padding:"10px 14px",marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}} onClick={()=>setShowFactors(!showFactors)}>
        <span style={{color:"#10b981",fontSize:12,fontWeight:700}}>🤖 AI analyzes 15 factors for maximum accuracy</span>
        <span style={{color:"var(--text2)",fontSize:12}}>{showFactors?"▲":"▼"}</span>
      </div>
      {showFactors&&<div style={{background:"var(--surface)",borderRadius:12,padding:14,marginBottom:16,border:"1px solid var(--border)"}} className="fade-in">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {["📊 Team Form","⚔️ Head-to-Head","🏥 Injuries","☁️ Weather","👨‍⚖️ Referee Stats","💹 Market Movement","📐 Poisson Model","🧠 Kelly Criterion","🏠 Home Advantage","⚡ Accum. Optimizer","💎 Value Detection","📈 Sharp Money","🎯 Risk Scoring","⚽ Tactical Match","🔮 ELO Ratings"].map(f=><div key={f} style={{color:"var(--text2)",fontSize:11}}>{f}</div>)}
        </div>
      </div>}

      {picks.map((p,i)=>(
        <div key={i} style={{background:"var(--surface)",borderRadius:16,padding:16,marginBottom:10,border:"1px solid var(--border)"}} className="fade-in">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:22,height:22,borderRadius:6,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11,fontWeight:900}}>{i+1}</div>
              <span style={{color:"var(--text2)",fontSize:11,fontWeight:700}}>PICK {i+1}</span>
            </div>
            {picks.length>1&&<button onClick={()=>setPicks(picks.filter((_,j)=>j!==i))} style={{color:"var(--red)",background:"rgba(248,81,73,0.1)",border:"none",cursor:"pointer",fontSize:11,padding:"4px 8px",borderRadius:6,fontWeight:700}}>Remove</button>}
          </div>
          <select value={p.match} onChange={e=>{const u=[...picks];u[i].match=e.target.value;setPicks(u);}} className="select" style={{marginBottom:8}}>
            <option value="">Select match...</option>
            {MATCHES[sport].map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <div style={{display:"flex",gap:8}}>
            <select value={p.pick} onChange={e=>{const u=[...picks];u[i].pick=e.target.value;setPicks(u);}} className="select" style={{flex:1}}>
              <option value="">Select pick...</option>
              {PICKS[sport].map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <input value={p.odds} onChange={e=>{const u=[...picks];u[i].odds=e.target.value;setPicks(u);}} placeholder="Odds" className="input" style={{width:72,textAlign:"center"}}/>
          </div>
        </div>
      ))}

      <button onClick={()=>setPicks([...picks,{match:"",pick:"",odds:""}])} style={{width:"100%",padding:11,background:"transparent",border:"2px dashed rgba(255,255,255,0.08)",borderRadius:12,color:"var(--text2)",fontSize:13,cursor:"pointer",marginBottom:16,fontWeight:600}}>+ Add Another Pick</button>

      <div style={{background:"var(--surface)",borderRadius:14,padding:14,marginBottom:16,border:"1px solid var(--border)"}}>
        <p style={{color:"var(--text2)",fontSize:11,fontWeight:700,marginBottom:10}}>STAKE AMOUNT</p>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          {[5,10,25,50,100].map(s=><button key={s} onClick={()=>setStake(s)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:`1px solid ${stake===s?"var(--green)":"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:stake===s?"rgba(16,185,129,0.1)":"var(--surface2)",color:stake===s?"var(--green)":"var(--text2)"}}>${s}</button>)}
        </div>
      </div>

      <button onClick={analyze} disabled={loading||picks.every(p=>!p.match)} className="btn-primary" style={{marginBottom:20}}>{loading?"🤖 Ultimate AI Analyzing...":"🚀 Analyze With Ultimate AI"}</button>

      {loading&&(
        <div style={{background:"var(--surface)",borderRadius:20,padding:24,border:"1px solid rgba(16,185,129,0.15)",marginBottom:16,textAlign:"center"}} className="card-glow">
          <div style={{fontSize:48,marginBottom:12}} className="bounce">🤖</div>
          <p style={{color:"white",fontWeight:900,fontSize:16,fontFamily:"'Syne',sans-serif",marginBottom:4}}>Ultimate AI Processing</p>
          <p style={{color:"var(--text2)",fontSize:12,marginBottom:20}}>Running 15-factor analysis...</p>
          <div>
            {loadSteps.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:i<=loadStep?1:0.25,transition:"opacity 0.5s"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:i<loadStep?"#10b981":i===loadStep?"#f0b429":"rgba(255,255,255,0.1)",flexShrink:0}} className={i===loadStep?"pulse":""}/>
                <span style={{color:i===loadStep?"white":i<loadStep?"#10b981":"var(--text3)",fontSize:12,textAlign:"left"}}>{s}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:10}}>
            <div style={{background:"linear-gradient(90deg,#10b981,#059669)",height:3,borderRadius:3,width:`${((loadStep+1)/loadSteps.length)*100}%`,transition:"width 0.5s ease"}}/>
          </div>
        </div>
      )}

      {analysis&&!loading&&(
        <div className="fade-in">
          <div style={{background:"linear-gradient(135deg,var(--surface),rgba(16,185,129,0.03))",borderRadius:20,padding:20,border:"1px solid rgba(16,185,129,0.15)",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><h3 style={{color:"white",fontSize:18,fontWeight:900,marginBottom:6}}>AI Verdict</h3><RecBadge rec={analysis.recommendation}/></div>
              <ConfRing v={analysis.overallConfidence}/>
            </div>
            {analysis.summary&&<div style={{background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.15)",borderRadius:10,padding:"8px 12px",marginBottom:12}}><p style={{color:"#10b981",fontSize:12,fontWeight:700}}>💡 {analysis.summary}</p></div>}
            <p style={{color:"#d1d5db",fontSize:13,lineHeight:1.7,marginBottom:14}}>{analysis.aiVerdict}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
              {[{l:"Combined Odds",v:`@${analysis.combinedOdds}`,c:"#f0b429"},{l:"Win Probability",v:analysis.winProbability,c:"#10b981"},{l:"Expected Value",v:analysis.expectedValue,c:"#58a6ff"},{l:"Potential Win",v:`$${(parseFloat(analysis.combinedOdds)*stake).toFixed(0)}`,c:"#10b981"},{l:"Kelly Stake",v:analysis.kellyStake,c:"#a78bfa"},{l:"Value Rating",v:analysis.valueRating,c:"#f0b429"}].map(item=><div key={item.l} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 8px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:14,fontFamily:"'Syne',sans-serif"}}>{item.v}</div><div style={{color:"var(--text3)",fontSize:10,marginTop:3}}>{item.l}</div></div>)}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              <RiskTag r={analysis.riskLevel}/>
              {analysis.marketConsensus&&<span style={{background:"rgba(88,166,255,0.1)",color:"#58a6ff",border:"1px solid rgba(88,166,255,0.2)",fontSize:10,padding:"3px 8px",borderRadius:20,fontWeight:700}}>📈 {analysis.marketConsensus}</span>}
            </div>
            {analysis.bankrollAdvice&&<div style={{background:"rgba(167,139,250,0.08)",borderRadius:10,padding:"8px 12px",marginBottom:8}}><p style={{color:"#a78bfa",fontSize:11,fontWeight:700}}>💰 BANKROLL: {analysis.bankrollAdvice}</p></div>}
            {analysis.accumulatorTip&&<div style={{background:"rgba(88,166,255,0.08)",borderRadius:10,padding:"8px 12px",marginBottom:8}}><p style={{color:"#58a6ff",fontSize:11,fontWeight:700}}>⚡ ACCA TIP: {analysis.accumulatorTip}</p></div>}
            {analysis.injuryAlert&&analysis.injuryAlert!=="No major injury alerts."&&<div style={{background:"rgba(248,81,73,0.08)",borderRadius:10,padding:"8px 12px",marginBottom:8}}><p style={{color:"#f85149",fontSize:11,fontWeight:700}}>🏥 INJURY: {analysis.injuryAlert}</p></div>}
            {analysis.betterAlternative&&<div style={{background:"rgba(240,180,41,0.08)",borderRadius:10,padding:"8px 12px"}}><p style={{color:"#f0b429",fontSize:11,fontWeight:700}}>💡 BETTER: {analysis.betterAlternative}</p></div>}
          </div>

          <h3 style={{color:"white",fontWeight:900,fontSize:15,marginBottom:10,fontFamily:"'Syne',sans-serif"}}>📊 Pick-by-Pick Breakdown</h3>
          {analysis.picks?.map((pick,i)=>(
            <div key={i} style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid var(--border)",marginBottom:8}} className="fade-in">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{flex:1,marginRight:12}}>
                  <p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:3}}>{pick.match}</p>
                  <p style={{color:"#10b981",fontSize:12,fontWeight:700}}>✓ {pick.pick}</p>
                </div>
                <div style={{textAlign:"center"}}><div style={{color:"#10b981",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif"}}>{pick.confidence}%</div><div style={{color:"var(--text3)",fontSize:9}}>CONF</div></div>
              </div>
              <ConfBar v={pick.confidence}/>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"10px 0"}}>
                {pick.formRating&&<GradeTag grade={pick.formRating}/>}
                {pick.valueRating&&<span style={{background:"rgba(255,255,255,0.05)",color:"var(--text2)",fontSize:10,padding:"2px 8px",borderRadius:6}}>{pick.valueRating} Value</span>}
                {pick.h2hEdge&&<span style={{background:"rgba(88,166,255,0.08)",color:"#58a6ff",fontSize:10,padding:"2px 8px",borderRadius:6}}>H2H: {pick.h2hEdge}</span>}
              </div>
              <p style={{color:"#9ca3af",fontSize:12,lineHeight:1.5,marginBottom:6}}>{pick.reasoning}</p>
              <p style={{color:"#58a6ff",fontSize:11}}>🔑 {pick.keyFactor}</p>
              {pick.riskNote&&<p style={{color:"#f0b429",fontSize:11,marginTop:4}}>⚠️ {pick.riskNote}</p>}
              {pick.alternativePick&&<p style={{color:"#a78bfa",fontSize:11,marginTop:4}}>💡 Alt: {pick.alternativePick}</p>}
            </div>
          ))}

          {analysis.warnings?.filter(w=>w).map((w,i)=><div key={i} style={{background:"rgba(240,180,41,0.08)",border:"1px solid rgba(240,180,41,0.2)",borderRadius:12,padding:"10px 14px",marginBottom:8}}><p style={{color:"#f0b429",fontSize:12,fontWeight:700}}>⚠️ {w}</p></div>)}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
            <button onClick={saveSlip} className="btn-ghost">💾 Save Slip</button>
            <button onClick={()=>{setAnalysis(null);setStep(1);setPicks([{match:"",pick:"",odds:""}]);}} style={{padding:12,background:"rgba(16,185,129,0.1)",color:"#10b981",border:"1px solid rgba(16,185,129,0.2)",borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer"}}>🔄 New Slip</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MARKETPLACE ──
function Marketplace({user,profile,refreshProfile}){
  const[slips,setSlips]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState("All");
  const[purchased,setPurchased]=useState([]);
  const[unlocked,setUnlocked]=useState(null);
  const[selling,setSelling]=useState(false);
  const[mySaved,setMySaved]=useState([]);
  const[selSlip,setSelSlip]=useState("");
  const[sellPrice,setSellPrice]=useState(1.99);
  const[sellDesc,setSellDesc]=useState("");

  useEffect(()=>{fetchSlips();fetchPurchased();fetchMySaved();},[user]);
  const fetchSlips=async()=>{setLoading(true);const{data}=await sb.from("slips").select("*,profiles(username,badge,win_rate,roi,plan)").eq("is_public",true).order("confidence",{ascending:false});setSlips(data||[]);setLoading(false);};
  const fetchPurchased=async()=>{if(!user)return;const{data}=await sb.from("purchases").select("slip_id").eq("buyer_id",user.id);setPurchased((data||[]).map(p=>p.slip_id));};
  const fetchMySaved=async()=>{if(!user)return;const{data}=await sb.from("slips").select("*").eq("user_id",user.id).eq("is_public",false);setMySaved(data||[]);};
  const buy=async(slip)=>{
    if(!profile)return;
    if(profile.wallet<slip.price){alert("Insufficient wallet! Top up in Profile.");return;}
    const fee=FEES[profile.plan]*slip.price;
    await sb.from("purchases").insert({buyer_id:user.id,slip_id:slip.id,seller_id:slip.user_id,amount:slip.price,platform_fee:fee});
    await sb.from("profiles").update({wallet:profile.wallet-slip.price-fee}).eq("id",user.id);
    await sb.from("transactions").insert({user_id:user.id,type:"slip_buy",amount:slip.price+fee,fee,description:`Bought slip from ${slip.profiles?.username}`});
    setPurchased(p=>[...p,slip.id]);setUnlocked(slip);refreshProfile();
  };
  const listForSale=async()=>{
    if(!selSlip)return;
    if(profile?.plan==="Free"){alert("Upgrade to Pro or Elite to sell slips!");return;}
    await sb.from("slips").update({is_public:true,price:sellPrice,description:sellDesc}).eq("id",selSlip);
    setSelling(false);fetchSlips();alert("✅ Slip listed on marketplace!");
  };
  const filtered=slips.filter(s=>filter==="All"||s.sport===filter);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Marketplace</h2><p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Wallet: <span style={{color:"var(--green)",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p></div>
        <button onClick={()=>setSelling(!selling)} style={{padding:"9px 14px",background:profile?.plan!=="Free"?"linear-gradient(135deg,#10b981,#059669)":"var(--surface2)",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Sell</button>
      </div>

      {selling&&(
        <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid rgba(16,185,129,0.2)",marginBottom:16}} className="fade-in">
          <p style={{color:"white",fontWeight:700,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>List a Slip For Sale</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <select value={selSlip} onChange={e=>setSelSlip(e.target.value)} className="select"><option value="">Select your saved slip...</option>{mySaved.map(s=><option key={s.id} value={s.id}>{s.sport} · {s.matches?.length} picks · {s.confidence}%</option>)}</select>
            <input value={sellPrice} onChange={e=>setSellPrice(parseFloat(e.target.value))} placeholder="Price (USD)" type="number" step="0.5" min="0.5" className="input"/>
            <input value={sellDesc} onChange={e=>setSellDesc(e.target.value)} placeholder="Short description for buyers..." className="input"/>
            <button onClick={listForSale} className="btn-primary">List For Sale</button>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["All","Football","Basketball"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filter===f?"var(--green)":"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:filter===f?"rgba(16,185,129,0.1)":"transparent",color:filter===f?"var(--green)":"var(--text2)"}}>{f}</button>)}
      </div>

      {loading?<Spinner/>:filtered.length===0?(
        <div style={{textAlign:"center",color:"var(--text2)",padding:60}}>
          <div style={{fontSize:48,marginBottom:12}}>🛒</div>
          <p style={{color:"white",fontWeight:700}}>No slips yet</p>
          <p style={{fontSize:13,marginTop:6}}>Build one with AI and sell it!</p>
        </div>
      ):filtered.map(slip=>(
        <div key={slip.id} style={{background:"var(--surface)",borderRadius:18,padding:16,border:slip.profiles?.badge==="elite"?"1px solid rgba(16,185,129,0.25)":"1px solid var(--border)",marginBottom:10}} className="fade-in">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:13,fontFamily:"'Syne',sans-serif"}}>{slip.profiles?.username?.slice(0,2).toUpperCase()||"??"}</div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{color:"white",fontWeight:700,fontSize:13}}>{slip.profiles?.username||"Tipster"}</span><Badge type={slip.profiles?.badge}/></div>
                <span style={{color:"var(--text2)",fontSize:11}}>ROI +{slip.profiles?.roi||0}% • {slip.sport}</span>
              </div>
            </div>
            <div style={{color:"var(--green)",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif"}}>${slip.price?.toFixed(2)}</div>
          </div>
          <div style={{marginBottom:12}}>
            {purchased.includes(slip.id)?slip.matches?.map((m,i)=><div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.1)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}><span style={{color:"#10b981",fontWeight:700}}>✓</span>{m}</div>):(
              <>
                <div style={{background:"var(--surface2)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"#d1d5db",display:"flex",gap:8}}><span style={{color:"#10b981"}}>✓</span>{slip.matches?.[0]}</div>
                {slip.matches?.slice(1).map((_,i)=><div key={i} style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:12,color:"transparent",filter:"blur(5px)",userSelect:"none"}}>🔒 Hidden premium pick #{i+2}</div>)}
              </>
            )}
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div><div style={{color:"#10b981",fontWeight:900,fontSize:14}}>{slip.confidence}%</div><div style={{color:"var(--text3)",fontSize:9}}>CONF</div></div>
              <div><div style={{color:"#f0b429",fontWeight:900,fontSize:14}}>@{slip.combined_odds?.toFixed(1)}</div><div style={{color:"var(--text3)",fontSize:9}}>ODDS</div></div>
              <RiskTag r={slip.risk_level}/>
            </div>
            {purchased.includes(slip.id)?<span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 14px",borderRadius:20}}>✓ Owned</span>
            :slip.user_id===user?.id?<span style={{color:"var(--text2)",fontSize:12,background:"var(--surface2)",padding:"6px 14px",borderRadius:20}}>Your slip</span>
            :<button onClick={()=>buy(slip)} className="btn-primary" style={{width:"auto",padding:"8px 18px",fontSize:13}}>Buy ${slip.price?.toFixed(2)}</button>}
          </div>
          {slip.description&&<p style={{color:"var(--text2)",fontSize:11,marginTop:8,fontStyle:"italic"}}>"{slip.description}"</p>}
        </div>
      ))}

      {unlocked&&purchased.includes(unlocked.id)&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(8px)"}} onClick={()=>setUnlocked(null)}>
          <div style={{background:"var(--surface)",borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:480,margin:"0 auto",border:"1px solid rgba(16,185,129,0.25)",borderBottom:"none"}} className="slide-up" onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:56,marginBottom:8}}>🎉</div>
              <h3 style={{color:"white",fontWeight:900,fontSize:22,fontFamily:"'Syne',sans-serif"}}>Slip Unlocked!</h3>
              <p style={{color:"var(--text2)",fontSize:13,marginTop:4}}>by {unlocked.profiles?.username} • {unlocked.confidence}% AI confidence</p>
            </div>
            {unlocked.matches?.map((m,i)=><div key={i} style={{background:"rgba(16,185,129,0.06)",border:"1px solid rgba(16,185,129,0.1)",borderRadius:12,padding:"12px 16px",marginBottom:8,display:"flex",gap:12}}><span style={{color:"#10b981",fontWeight:900}}>#{i+1}</span><span style={{color:"white",fontSize:13}}>{m}</span></div>)}
            {unlocked.ai_analysis?.aiVerdict&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"10px 14px",marginBottom:16}}><p style={{color:"#9ca3af",fontSize:12,fontStyle:"italic"}}>🤖 "{unlocked.ai_analysis.aiVerdict}"</p></div>}
            <button onClick={()=>setUnlocked(null)} className="btn-primary">Got it — Good luck! 🍀</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── LEADERBOARD ──
function Leaderboard(){
  const[tipsters,setTipsters]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{sb.from("profiles").select("*").order("win_rate",{ascending:false}).limit(20).then(({data})=>{setTipsters((data||[]).filter(t=>t.total_sold>0||t.win_rate>0));setLoading(false);});},[]);
  return(
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Leaderboard</h2><p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Top tipsters • Resets every Monday</p></div>
      {loading?<Spinner/>:tipsters.length===0?(
        <div style={{textAlign:"center",color:"var(--text2)",padding:60}}>
          <div style={{fontSize:56,marginBottom:12}}>🏆</div>
          <p style={{color:"white",fontWeight:900,fontSize:18,fontFamily:"'Syne',sans-serif"}}>Empty Leaderboard</p>
          <p style={{fontSize:13,marginTop:6}}>Build & sell slips to rank!</p>
        </div>
      ):(
        <>
          {tipsters.length>=3&&(
            <div style={{background:"linear-gradient(180deg,var(--surface),var(--bg))",borderRadius:20,padding:20,border:"1px solid var(--border)",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:20}}>
                {[tipsters[1],tipsters[0],tipsters[2]].map((t,i)=>{
                  if(!t)return null;
                  const h=[88,116,68],cl=["#4b5563","#f0b429","#92400e"],med=["🥈","🥇","🥉"],rk=[2,1,3];
                  return<div key={t.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <span style={{fontSize:22}}>{med[i]}</span>
                    <div style={{width:46,height:46,borderRadius:14,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:14,fontFamily:"'Syne',sans-serif"}}>{t.username?.slice(0,2).toUpperCase()}</div>
                    <span style={{color:"white",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{t.username}</span>
                    <span style={{color:"#10b981",fontSize:11,fontWeight:700}}>{t.win_rate}%</span>
                    <div style={{width:60,height:h[i],background:cl[i],borderRadius:"10px 10px 0 0",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"white",fontWeight:900}}>#{rk[i]}</span></div>
                  </div>;
                })}
              </div>
            </div>
          )}
          {tipsters.map((t,i)=>(
            <div key={t.id} style={{background:"var(--surface)",borderRadius:16,padding:14,border:t.badge==="elite"?"1px solid rgba(16,185,129,0.2)":"1px solid var(--border)",marginBottom:8}} className="fade-in">
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:32,height:32,borderRadius:10,background:i===0?"linear-gradient(135deg,#f0b429,#d97706)":i===1?"linear-gradient(135deg,#9ca3af,#6b7280)":i===2?"linear-gradient(135deg,#92400e,#78350f)":"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,color:i<3?"black":"var(--text2)",fontFamily:"'Syne',sans-serif"}}>#{i+1}</div>
                <div style={{width:42,height:42,borderRadius:12,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:14,fontFamily:"'Syne',sans-serif"}}>{t.username?.slice(0,2).toUpperCase()}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"white",fontWeight:700,fontSize:14}}>{t.username}</span><Badge type={t.badge}/></div>
                  <span style={{color:"var(--text2)",fontSize:11}}>{t.plan} • {t.total_sold} sold</span>
                </div>
                <div style={{textAlign:"right"}}><div style={{color:"#10b981",fontWeight:900,fontSize:18,fontFamily:"'Syne',sans-serif"}}>{t.win_rate}%</div><div style={{color:"var(--text3)",fontSize:10}}>Win Rate</div></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:10}}>
                {[{l:"ROI",v:`+${t.roi}%`,c:"#f0b429"},{l:"Streak",v:`${t.streak}🔥`,c:"#f97316"},{l:"Sold",v:t.total_sold,c:"#58a6ff"}].map(item=><div key={item.l} style={{background:"var(--surface2)",borderRadius:10,padding:"7px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:13,fontFamily:"'Syne',sans-serif"}}>{item.v}</div><div style={{color:"var(--text3)",fontSize:10,marginTop:2}}>{item.l}</div></div>)}
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ── PLANS ──
function Plans({user,profile,refreshProfile}){
  const[upgrading,setUpgrading]=useState(null);
  const plans=[
    {name:"Free",price:0,color:"#6b7280",badge:"none",icon:"🌱",features:["3 AI analyses/day","Browse marketplace","Buy slips (5% fee)","View leaderboard"]},
    {name:"Pro",price:9.99,color:"#f0b429",badge:"verified",icon:"🔥",features:["Unlimited AI analyses","Sell up to 20 slips/week","Buy slips (2% fee)","Pro badge","Advanced analytics"]},
    {name:"Elite",price:24.99,color:"#10b981",badge:"elite",icon:"⚡",features:["Everything in Pro","Unlimited slip selling","Zero platform fees","Elite badge + promo","Featured on leaderboard","Founder direct support"]},
  ];
  const upgrade=async(plan)=>{
    if(!user||!profile)return;
    if(plan.name===profile.plan)return;
    if(plan.price>0&&profile.wallet<plan.price){alert(`Need $${plan.price}. Top up in Profile!`);return;}
    setUpgrading(plan.name);
    await sb.from("profiles").update({plan:plan.name,badge:plan.badge,wallet:plan.price>0?profile.wallet-plan.price:profile.wallet}).eq("id",user.id);
    if(plan.price>0)await sb.from("transactions").insert({user_id:user.id,type:"subscription",amount:plan.price,fee:plan.price,description:`Upgraded to ${plan.name}`});
    await refreshProfile();setUpgrading(null);alert(`✅ Welcome to ${plan.name}!`);
  };
  return(
    <div>
      <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Plans</h2><p style={{color:"var(--text2)",fontSize:12,marginTop:4}}>Current: <span style={{color:"var(--green)",fontWeight:700}}>{profile?.plan||"Free"}</span> • Wallet: <span style={{color:"var(--green)",fontWeight:700}}>${profile?.wallet?.toFixed(2)||"0.00"}</span></p></div>
      {plans.map(plan=>(
        <div key={plan.name} style={{background:profile?.plan===plan.name?"linear-gradient(135deg,var(--surface),rgba(16,185,129,0.04))":"var(--surface)",borderRadius:20,padding:20,border:profile?.plan===plan.name?"2px solid rgba(16,185,129,0.4)":"2px solid var(--border)",marginBottom:14}}>
          {plan.name==="Pro"&&<div style={{display:"inline-flex",padding:"4px 12px",borderRadius:20,background:"rgba(240,180,41,0.1)",color:"#f0b429",fontSize:11,fontWeight:900,border:"1px solid rgba(240,180,41,0.2)",marginBottom:12}}>⭐ MOST POPULAR</div>}
          {plan.name==="Elite"&&<div style={{display:"inline-flex",padding:"4px 12px",borderRadius:20,background:"rgba(16,185,129,0.1)",color:"#10b981",fontSize:11,fontWeight:900,border:"1px solid rgba(16,185,129,0.2)",marginBottom:12}}>👑 BEST VALUE</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:20}}>{plan.icon}</span><h3 style={{color:"white",fontSize:22,fontWeight:900}}>{plan.name}</h3></div>
              <div style={{fontWeight:900,fontSize:28,fontFamily:"'Syne',sans-serif",color:plan.color}}>{plan.price===0?"FREE":`$${plan.price}`}{plan.price>0&&<span style={{fontSize:13,fontWeight:400,color:"var(--text2)"}}>/month</span>}</div>
            </div>
            {profile?.plan===plan.name&&<span style={{color:"#10b981",fontSize:12,fontWeight:700,background:"rgba(16,185,129,0.1)",padding:"6px 14px",borderRadius:20}}>✓ Active</span>}
          </div>
          <div style={{marginBottom:18}}>{plan.features.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",color:"#d1d5db",fontSize:13}}><span style={{color:plan.color,fontWeight:700}}>✓</span>{f}</div>)}</div>
          <button onClick={()=>upgrade(plan)} disabled={profile?.plan===plan.name||upgrading===plan.name} style={{width:"100%",padding:14,borderRadius:14,border:"none",cursor:profile?.plan===plan.name?"default":"pointer",fontWeight:700,fontSize:14,fontFamily:"'Syne',sans-serif",background:profile?.plan===plan.name?`rgba(255,255,255,0.05)`:plan.price===0?"var(--surface2)":plan.color==="#10b981"?"linear-gradient(135deg,#10b981,#059669)":plan.color==="#f0b429"?"linear-gradient(135deg,#f0b429,#d97706)":"var(--surface2)",color:profile?.plan===plan.name?"var(--text2)":"white",opacity:upgrading===plan.name?0.7:1}}>
            {upgrading===plan.name?"Processing...":profile?.plan===plan.name?"✓ Current Plan":`Upgrade to ${plan.name}${plan.price>0?` — $${plan.price}`:""}`}
          </button>
        </div>
      ))}
    </div>
  );
}

// ── PROFILE ──
function Profile({user,profile,refreshProfile}){
  const[topUp,setTopUp]=useState(20);
  const[history,setHistory]=useState([]);
  const[bio,setBio]=useState(profile?.bio||"");
  const[editBio,setEditBio]=useState(false);
  useEffect(()=>{setBio(profile?.bio||"");if(user)sb.from("transactions").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(20).then(({data})=>setHistory(data||[]));},[user,profile]);
  const addFunds=async()=>{await sb.from("profiles").update({wallet:(profile?.wallet||0)+topUp}).eq("id",user.id);await sb.from("transactions").insert({user_id:user.id,type:"topup",amount:topUp,fee:0,description:`Wallet top-up $${topUp}`});refreshProfile();};
  const saveBio=async()=>{await sb.from("profiles").update({bio}).eq("id",user.id);setEditBio(false);refreshProfile();};
  const txC={topup:"#10b981",subscription:"#f0b429",slip_buy:"#58a6ff",slip_sale:"#a78bfa"};
  const txI={topup:"💳",subscription:"⚡",slip_buy:"🛒",slip_sale:"💰"};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:24,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>Profile</h2>
        <button onClick={()=>sb.auth.signOut()} style={{color:"#f85149",background:"rgba(248,81,73,0.1)",border:"1px solid rgba(248,81,73,0.2)",borderRadius:10,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>Sign Out</button>
      </div>
      <div style={{background:"linear-gradient(135deg,var(--surface),var(--surface2))",borderRadius:20,padding:20,border:"1px solid var(--border)",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
          <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:900,fontSize:26,fontFamily:"'Syne',sans-serif",boxShadow:"0 8px 24px rgba(16,185,129,0.25)"}} className="glow">{profile?.username?.slice(0,1).toUpperCase()||"U"}</div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{color:"white",fontWeight:900,fontSize:18,fontFamily:"'Syne',sans-serif"}}>{profile?.username}</span><Badge type={profile?.badge}/></div>
            <p style={{color:"var(--text2)",fontSize:12}}>{profile?.plan} Plan</p>
          </div>
        </div>
        {editBio?(
          <div style={{marginBottom:14}}>
            <textarea value={bio} onChange={e=>setBio(e.target.value)} placeholder="Tell others about your betting expertise..." style={{width:"100%",background:"var(--surface2)",color:"white",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",fontSize:12,height:72,resize:"none",fontFamily:"'DM Sans',sans-serif"}}/>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              <button onClick={saveBio} style={{flex:1,padding:8,background:"#10b981",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button>
              <button onClick={()=>setEditBio(false)} style={{flex:1,padding:8,background:"var(--surface2)",color:"var(--text2)",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <p style={{color:"var(--text2)",fontSize:12,flex:1,lineHeight:1.5}}>{profile?.bio||"No bio yet. Add one to attract buyers!"}</p>
            <button onClick={()=>setEditBio(true)} style={{color:"var(--green)",background:"none",border:"none",fontSize:12,cursor:"pointer",marginLeft:10,fontWeight:700}}>Edit</button>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {[{l:"Wallet",v:`$${profile?.wallet?.toFixed(0)||0}`,c:"#10b981"},{l:"Win Rate",v:`${profile?.win_rate||0}%`,c:"#f0b429"},{l:"Streak",v:`${profile?.streak||0}🔥`,c:"#f97316"},{l:"Sold",v:profile?.total_sold||0,c:"#58a6ff"}].map(item=><div key={item.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:"10px 6px",textAlign:"center"}}><div style={{color:item.c,fontWeight:900,fontSize:15,fontFamily:"'Syne',sans-serif"}}>{item.v}</div><div style={{color:"var(--text3)",fontSize:10,marginTop:2}}>{item.l}</div></div>)}
        </div>
      </div>

      <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid var(--border)",marginBottom:12}}>
        <p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>💳 Top Up Wallet</p>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {[5,10,20,50,100,200].map(a=><button key={a} onClick={()=>setTopUp(a)} style={{flex:1,minWidth:44,padding:"9px 4px",borderRadius:10,border:`1px solid ${topUp===a?"var(--green)":"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:11,background:topUp===a?"rgba(16,185,129,0.1)":"var(--surface2)",color:topUp===a?"var(--green)":"var(--text2)"}}>${a}</button>)}
        </div>
        <button onClick={addFunds} className="btn-primary">Add ${topUp} to Wallet</button>
        <p style={{color:"var(--text3)",fontSize:10,textAlign:"center",marginTop:8}}>* Flutterwave M-Pesa/Tigo/Airtel integration coming soon</p>
      </div>

      <div style={{background:"var(--surface)",borderRadius:16,padding:16,border:"1px solid var(--border)"}}>
        <p style={{color:"white",fontWeight:700,fontSize:14,marginBottom:12,fontFamily:"'Syne',sans-serif"}}>Transaction History</p>
        {history.length===0?<p style={{color:"var(--text2)",fontSize:12,textAlign:"center",padding:"16px 0"}}>No transactions yet</p>
        :history.map(tx=><div key={tx.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>{txI[tx.type]||"💫"}</span>
            <div><p style={{color:"white",fontSize:12,fontWeight:600}}>{tx.description}</p><p style={{color:"var(--text3)",fontSize:11}}>{new Date(tx.created_at).toLocaleDateString()}</p></div>
          </div>
          <span style={{fontWeight:700,fontSize:13,color:txC[tx.type]||"white"}}>{["topup","slip_sale"].includes(tx.type)?"+":"-"}${tx.amount?.toFixed(2)}</span>
        </div>)}
      </div>
    </div>
  );
}

// ── MAIN APP ──
function BetIQ(){
  const{user,profile,loading,refreshProfile}=useAuth();
  const[screen,setScreen]=useState("builder");
  const nav=[{id:"builder",icon:"🤖",label:"AI"},{id:"market",icon:"🛒",label:"Market"},{id:"board",icon:"🏆",label:"Rankings"},{id:"plans",icon:"⚡",label:"Plans"},{id:"profile",icon:"👤",label:"Profile"}];
  if(loading)return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,fontWeight:900,color:"white",fontFamily:"'Syne',sans-serif",boxShadow:"0 20px 60px rgba(16,185,129,0.3)"}} className="glow">B</div>
      <div style={{width:32,height:32,border:"2px solid rgba(16,185,129,0.2)",borderTopColor:"#10b981",borderRadius:"50%"}} className="spin"/>
    </div>
  );
  if(!user)return<AuthScreen/>;
  const screens={builder:<AIBuilder user={user} profile={profile} refreshProfile={refreshProfile}/>,market:<Marketplace user={user} profile={profile} refreshProfile={refreshProfile}/>,board:<Leaderboard/>,plans:<Plans user={user} profile={profile} refreshProfile={refreshProfile}/>,profile:<Profile user={user} profile={profile} refreshProfile={refreshProfile}/>};
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{position:"sticky",top:0,zIndex:40,background:"rgba(3,7,18,0.92)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid var(--border)"}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#10b981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:16,fontFamily:"'Syne',sans-serif"}}>B</div>
            <span style={{color:"white",fontWeight:900,fontSize:20,fontFamily:"'Syne',sans-serif",letterSpacing:"-0.5px"}}>BetIQ</span>
            <div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(16,185,129,0.1)",border:"1px solid rgba(16,185,129,0.2)",padding:"3px 8px",borderRadius:20}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:"#10b981"}} className="pulse"/>
              <span style={{color:"#10b981",fontSize:10,fontWeight:700}}>LIVE</span>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Badge type={profile?.badge}/>
            <div style={{color:"#10b981",fontSize:13,fontWeight:700,background:"rgba(16,185,129,0.08)",padding:"7px 12px",borderRadius:10,border:"1px solid rgba(16,185,129,0.15)",fontFamily:"'Syne',sans-serif"}}>${profile?.wallet?.toFixed(2)||"0.00"}</div>
          </div>
        </div>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"16px 16px 96px"}}>{screens[screen]}</div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,background:"rgba(3,7,18,0.96)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderTop:"1px solid var(--border)"}} className="safe-bottom">
        <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>
          {nav.map(item=><button key={item.id} onClick={()=>setScreen(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:3,background:"none",border:"none",cursor:"pointer",color:screen===item.id?"#10b981":"var(--text3)",transition:"color 0.2s",position:"relative"}}>
            <span style={{fontSize:21}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{item.label}</span>
            {screen===item.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:"#10b981",borderRadius:"0 0 4px 4px"}}/>}
          </button>)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BetIQ/>);
</script>
